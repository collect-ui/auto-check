service:
  - key: travel_checkin_validate_account
    http: true
    must_login: false
    module: empty
    params:
      username:
        check:
          template: "{{must .username}}"
          err_msg: 同步账号不能为空
      password:
        check:
          template: "{{must .password}}"
          err_msg: 同步密码不能为空
      login_password:
        template: "{{ if .password }}{{if eq (len .password) 32}}{{.password}}{{else}}{{md5 .password}}{{end}}{{ end }}"
    handler_params:
      - key: service2field
        service:
          service: spider_qi_work.login
          username: "[username]"
          password: "[login_password]"
          to_obj: true
        save_field: login_info
    result_handler:
      - key: param2result
        field: "[login_info]"

  - key: travel_checkin_apply_list
    http: true
    module: sql
    params:
      apply_id:
        default: ""
      apply_id_list:
        default: []
      exclude_apply_id:
        default: ""
      agency_code:
        default: ""
      username:
        default: ""
      login_username:
        default: ""
      user_id:
        default: ""
      status:
        default: ""
      status_list:
        default: []
      active_only:
        default: false
      search:
        template: "{{ if .search }}%{{.search}}%{{ end }}"
      page:
        type: int
        default: 1
      size:
        type: int
        default: 20
      start:
        template: " ({{.page}}-1) * {{.size}}"
        exec: true
        type: int
      pagination:
        default: true
      count:
        default: true
      to_obj:
        default: false
    data_file: travel_checkin_apply_list.sql
    count_file: travel_checkin_apply_count.sql
    pagination: pagination
    count: "[count]"
    result_handler:
      - key: arr2obj
        enable: "[to_obj]"

  - key: travel_checkin_relation_list
