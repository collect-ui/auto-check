      - key: prop_arr
        enable: "{{gt (len .soft_delete_user_list) 0}}"
        foreach: "[soft_delete_user_list]"
        value: "[user_id]"
        save_field: soft_delete_user_id_list
      - key: service2field
        enable: "{{must .apply_info.agency_id}}"
        service:
          service: hrm.travel_checkin_relation_delete_by_agency
          agency_id: "[apply_info.agency_id]"
        save_field: relation_delete_result
      - key: service2field
        enable: "{{gt (len .company_role_remove_user_id_list) 0}}"
        service:
          service: hrm.user_role_id_list_remove
          role_id: company
          user_id_list: "[company_role_remove_user_id_list]"
        save_field: company_role_remove_result
      - key: service2field
        enable: "{{gt (len .soft_delete_user_id_list) 0}}"
        service:
          service: hrm.delete_user_by_user_id_list
          user_id_list: "[soft_delete_user_id_list]"
        save_field: user_delete_result
      - key: service2field
        service:
          service: hrm.travel_agency_delete
          agency_id: "[apply_info.agency_id]"
        save_field: agency_delete_result
      - key: service2field
        service:
          service: hrm.travel_checkin_apply_update_raw
          apply_id: "[apply_id]"
          status: revoked
        save_field: apply_revoke_result
    result_handler:
      - key: params2result
        fields:
          - from: "[apply_id]"
            to: apply_id
          - from: "[apply_info.agency_id]"
            to: agency_id
          - from: "[relation_user_id_list]"
            to: relation_user_id_list
          - from: "[company_role_remove_user_id_list]"
            to: removed_company_role_user_id_list
          - from: "[soft_delete_user_id_list]"
            to: soft_deleted_user_id_list
          - from: revoked
            to: status
