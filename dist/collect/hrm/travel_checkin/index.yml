    table: travel_model_price
    params:
      model_price_id:
        check:
          template: "{{must .model_price_id}}"
          err_msg: 模型价格ID不能为空
      provider:
        default: deepseek
      model_name:
        check:
          template: "{{must .model_name}}"
          err_msg: 模型名称不能为空
      currency:
        default: CNY
      input_cache_hit_price_per_1m:
        default: 0
        type: float64
      input_cache_miss_price_per_1m:
        default: 0
        type: float64
      output_price_per_1m:
        default: 0
        type: float64
      description:
        default: ""
      modify_time:
        template: "{{current_date_time}}"
      modify_user:
        template: "{{if .session_user_id}}{{.session_user_id}}{{else}}system{{end}}"
    filter:
      model_price_id: "[model_price_id]"
    update_fields:
      - provider
      - model_name
      - currency
      - input_cache_hit_price_per_1m
      - input_cache_miss_price_per_1m
      - output_price_per_1m
      - description
      - modify_time
      - modify_user

