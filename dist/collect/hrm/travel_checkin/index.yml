  - key: travel_model_price_save
    http: true
    module: model_save
    table: travel_model_price
    params:
      model_price_id:
        template: "{{uuid}}"
      provider:
        default: deepseek
      model_name:
        check:
          template: "{{must .model_name}}"
          err_msg: 模型名称不能为空
      currency:
        default: CNY
      input_cache_hit_price_per_1m:
        default: 0
        type: float64
      input_cache_miss_price_per_1m:
        default: 0
        type: float64
      output_price_per_1m:
        default: 0
        type: float64
      description:
        default: ""
      status:
        default: normal
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{if .session_user_id}}{{.session_user_id}}{{else}}system{{end}}"
      modify_time:
        template: "{{current_date_time}}"
      modify_user:
        template: "{{if .session_user_id}}{{.session_user_id}}{{else}}system{{end}}"

  - key: travel_model_price_update
    http: true
