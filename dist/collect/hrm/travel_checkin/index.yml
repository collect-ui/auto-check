    handler_params:
      - key: service2field
        service:
          service: hrm.travel_checkin_apply_list
          apply_id: "[apply_id]"
          to_obj: true
          pagination: false
          count: false
        save_field: apply_info
        template: "{{must .apply_info.apply_id}}"
        err_msg: 申请记录不存在
      - key: check_field
        fields:
          - field: status
            template: "{{eq .apply_info.status `approved`}}"
