  - key: travel_checkin_apply_approve
    http: true
    module: empty
    params:
      apply_id:
        check:
          template: "{{must .apply_id}}"
          err_msg: 申请ID不能为空
      deepseek_api_key:
        check:
          template: "{{must .deepseek_api_key}}"
          err_msg: DeepSeek Key不能为空
      escape_system_prompt:
        default: |
          角色定义
          你是资深旅游销售风控分析助手，专注于识别员工在与客户沟通中可能存在的“逃单/飞单”风险行为。
          基本原则
          仅基于提供的微信聊天记录与电话转写文本进行分析。
          不臆测、不补造任何事实。
          每一条风险判断必须可追溯到原文证据。
          需要识别的风险行为类型（明确或疑似）
          引导客户脱离公司渠道
          要求更换沟通工具（如微信、电话、QQ、Telegram 等）
          建议绕过公司系统下单、签约或咨询
          交换私人联系方式
          发送或索要个人手机号、私人微信号、QQ号、邮箱等
          使用谐音、拆分、数字变体（如“加V”“138 0000 1111”“幺三八”“薇”）
          私下收款或成交
          要求客户转账至个人账户、非公司账户
          提及“不走平台”“线下付”“对公不方便就转我”等
          规避公司监管
          建议删除或撤回聊天记录
          要求“不要告诉公司”“别截图”“改备注”
          使用阅后即焚类工具或话术
          拒绝或不配合公司流程
          明确表示不走标准流程
          引导客户直接联系员工个人而非公司客服/销售系统
      escape_user_prompt:
        default: |
          一、重点识别的高风险特征（包括但不限于谐音、变体、拆分形式）：
          更换沟通渠道/平台：
          明确要求：“加个V”、“换个地方说”、“这个软件不方便”、“我们私下聊”、“加个QQ”。
          谐音/变体：+V/＋微/薇/X（代指微信）、企鹅/秋秋（代指QQ）、钉/ding（代指钉钉）、电报/纸飞机（代指Telegram）、泡泡/抱抱（代指Bubble）。
          交换联系方式（尤其强调私下）：
          手机/电话：直接发数字、分三段发（如 138 0000 1111）、谐音（“幺三八”、“亿三八”、“亿三叭”）、英文数字组合（one three eight）。
          微信号：VX/微X/威信、账号/号/码、用“我加你”、“你扫我”代替直接文字。
          其他：邮箱（尤其非公司邮箱）、个人手机号短信联系。
          绕开公司流程或诱导私下交易：
          绕过平台下单：“别在系统上付”、“不走平台”、“线下转给我”、“对公账户不要用”、“个人转给你”。
          绕过客服/销售：“直接联系我”、“不要找其他人”、“这是秘密”。
          使用非公司支付工具：支/宝、某宝、某信、数字（金额后跟“转我”）。
          要求删除、隐藏或伪造证据：
          删除记录：“删了聊天记录”、“把这条撤回去”、“别说我找过你”、“别截图”。
          修改沟通记录：“你把我备注改一下”、“改个名字”。
          使用阅后即焚或撤回功能。
          其他可疑话术：
          “便宜点我直接转给你”、“不要发票能少多少”、“你个人收行不行”、“别告诉公司”。
          长串无意义数字（需检查是否为隐藏电话号码或订单号）。
          二、分析结论要求：
          请结合上下文对每条沟通记录判断为以下三类之一：
          明确行为：客户或员工已明确表达或执行了上述高风险动作（例如：“加我微信138xxxx”）。
          疑似倾向：存在强烈暗示、谐音、拆解数字、试探性话语（例如：“这个聊不方便”、“有没有更直接的方式”、“1-3-8…”），但未完整表达。
          无相关迹象：全程使用公司指定沟通工具、未索要/提供个人联系方式、未提及线下交易或删除证据
          不管有没有成交，结果如果，只要出现了迹象都算逃单，只要出现了加个人微信的想法，都算逃单，不管是员工有没有同意，客户有没有同意
      escape_repeat_ad_keywords:
        default: |
          特价秒杀,限时抢购,私聊优惠,全网最低价,加V详谈
    handler_params:
      - key: update_field
        fields:
          - field: audit_time_value
            template: "{{current_date_time}}"
      - key: service2field
        service:
          service: hrm.travel_checkin_apply_list
          apply_id: "[apply_id]"
          to_obj: true
          pagination: false
          count: false
        save_field: apply_info
        template: "{{must .apply_info.apply_id}}"
        err_msg: 申请记录不存在
      - key: check_field
        fields:
          - field: status
            template: "{{eq .apply_info.status `pending`}}"
            err_msg: 当前申请状态不是待审核
      - key: service2field
        service:
          service: hrm.travel_checkin_validate_account
          username: "[apply_info.username]"
          password: "[apply_info.password]"
        save_field: login_info
      - key: service2field
        service:
          service: hrm.travel_agency_list
          agency_code: "[apply_info.agency_code]"
          pagination: false
          count: false
        save_field: local_agency_list
        template: "{{eq (len .local_agency_list) 0}}"
        err_msg: 当前旅行社编码已存在
      - key: service2field
        enable: "{{ if .apply_info.user_id }}true{{ end }}"
        service:
          service: hrm.user_list
          user_id: "[apply_info.user_id]"
          to_obj: true
          pagination: false
          count: false
        save_field: local_login_user
        template: "{{eq .local_login_user.username .apply_info.agency_code}}"
        err_msg: 当前申请绑定用户与登录账号不一致
      - key: service2field
        enable: "{{ if .apply_info.user_id }}true{{ end }}"
        service:
          service: hrm.travel_checkin_relation_list
          user_id: "[apply_info.user_id]"
          role_type: admin
          status: normal
        save_field: relation_list
        template: "{{eq (len .relation_list) 0}}"
        err_msg: 当前账号已绑定其他旅行社管理员
      - key: service2field
        enable: "{{ if .apply_info.user_id }}false{{ else }}true{{ end }}"
        service:
          service: hrm.create_user_flow
          username: "[apply_info.agency_code]"
          nick: "[apply_info.contact_name]"
          phone: "[apply_info.contact_phone]"
          password: "[apply_info.password]"
          role_id_list: ["company"]
          status: trial
        save_field: created_user_id
      - key: service2field
        enable: "{{ if .apply_info.user_id }}false{{ else }}true{{ end }}"
        service:
          service: hrm.travel_checkin_apply_update_raw
          apply_id: "[apply_id]"
          user_id: "[created_user_id]"
        save_field: update_user_id_result
      - key: update_field
        fields:
          - field: resolved_user_id
            template: "{{if .apply_info.user_id}}{{.apply_info.user_id}}{{else}}{{.created_user_id}}{{end}}"
      - key: service2field
        service:
          service: hrm.travel_agency_save
          agency_name: "[apply_info.agency_name]"
          agency_code: "[apply_info.agency_code]"
          biz_type: travel
          status: normal
          checkin_status: checked_in
          wx_sync_enabled: "yes"
          wx_sync_account: "[apply_info.username]"
          wx_sync_password: "[apply_info.password]"
          deepseek_api_key: "[deepseek_api_key]"
          escape_system_prompt: "[escape_system_prompt]"
          escape_user_prompt: "[escape_user_prompt]"
          escape_repeat_ad_keywords: "[escape_repeat_ad_keywords]"
          description: "入住申请审批通过自动创建"
        save_field: agency_save_result
      - key: service2field
        service:
          service: hrm.travel_agency_list
          agency_code: "[apply_info.agency_code]"
          to_obj: true
          pagination: false
          count: false
        save_field: saved_agency_info
        template: "{{must .saved_agency_info.agency_id}}"
        err_msg: 审批后未查询到新建旅行社
      - key: service2field
        service:
          service: hrm.travel_checkin_relation_save_raw
          agency_id: "[saved_agency_info.agency_id]"
          user_id: "[resolved_user_id]"
          role_type: admin
          description: "入住申请审批通过自动绑定"
        save_field: relation_save_result
      - key: service2field
        service:
          service: hrm.travel_checkin_user_company_role_ensure
          user_id: "[resolved_user_id]"
        save_field: role_ensure_result
      - key: service2field
        service:
          service: hrm.travel_checkin_apply_update_raw
          apply_id: "[apply_id]"
          status: approved
          agency_id: "[saved_agency_info.agency_id]"
          user_id: "[resolved_user_id]"
          audit_time: "[audit_time_value]"
          audit_user: "[session_user_id]"
          reject_reason: ""
        save_field: update_result
    result_handler:
      - key: params2result
        fields:
          - from: "[apply_id]"
            to: apply_id
          - from: "[saved_agency_info.agency_id]"
            to: agency_id
          - from: approved
            to: status

