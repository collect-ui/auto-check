        check:
          template: "{{must .agency_name}}"
          err_msg: 旅行社名称不能为空
      agency_code:
        check:
          template: "{{must .agency_code}}"
          err_msg: 旅行社编码不能为空
      contact_name:
        check:
          template: "{{must .contact_name}}"
          err_msg: 联系人不能为空
      contact_phone:
        check:
          template: "{{must .contact_phone}}"
          err_msg: 联系手机号不能为空
      username:
        check:
          template: "{{must .username}}"
          err_msg: 用户名不能为空
      password:
        check:
          template: "{{must .password}}"
          err_msg: 密码不能为空
      user_id:
        default: ""
      login_username:
        default: ""
      status:
        default: pending
      reject_reason:
        default: ""
      agency_id:
        default: ""
      audit_time:
        default: ""
      audit_user:
        default: ""
      create_time:
        template: "{{current_date_time}}"

  - key: travel_checkin_apply_update_raw
