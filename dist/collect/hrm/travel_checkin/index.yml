      exclude_role_id:
        default: ""
      pagination:
        default: false
    data_file: travel_checkin_user_role_user_list.sql

  - key: travel_agency_manage_update
    http: true
    module: empty
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
      agency_name:
        check:
          template: "{{must .agency_name}}"
          err_msg: 旅行社名称不能为空
      agency_code:
        check:
          template: "{{must .agency_code}}"
          err_msg: 旅行社编码不能为空
      relation_user_id:
        check:
          template: "{{must .relation_user_id}}"
          err_msg: 关联用户不能为空
      wx_sync_error_count:
        default: 0
        type: int
      wx_sync_expire_time:
        default: 0
        type: int
      deepseek_api_key:
        default: ""
      escape_system_prompt:
        default: ""
      escape_user_prompt:
        default: ""
      escape_repeat_ad_keywords:
        default: ""
    handler_params:
      - key: service2field
        service:
          service: hrm.travel_agency_manage_list
          agency_id: "[agency_id]"
          to_obj: true
          pagination: false
          count: false
        save_field: current_agency_info
        template: "{{must .current_agency_info.agency_id}}"
        err_msg: 旅行社不存在
      - key: service2field
        service:
          service: hrm.user_list
          user_id: "[relation_user_id]"
          to_obj: true
          pagination: false
          count: false
        save_field: relation_user_info
        template: "{{must .relation_user_info.user_id}}"
        err_msg: 关联用户不存在
      - key: service2field
        service:
          service: hrm.travel_checkin_relation_list
          user_id: "[relation_user_id]"
          role_type: admin
          status: normal
        save_field: target_relation_list
      - key: filter_arr
        foreach: "[target_relation_list]"
        item: item
        if_template: "{{ne .item.agency_id .agency_id}}"
        save_field: target_other_agency_relation_list
      - key: prop_arr
        enable: "{{gt (len .target_other_agency_relation_list) 0}}"
        foreach: "[target_other_agency_relation_list]"
        value: "[relation_id]"
        save_field: target_other_agency_relation_id_list
      - key: service2field
        service:
          service: hrm.travel_checkin_relation_list
          agency_id: "[agency_id]"
          role_type: admin
          status: normal
        save_field: current_agency_relation_list
      - key: filter_arr
        foreach: "[current_agency_relation_list]"
        item: item
        if_template: "{{ne .item.user_id .relation_user_id}}"
        save_field: current_agency_other_relation_list
      - key: prop_arr
        enable: "{{gt (len .current_agency_other_relation_list) 0}}"
        foreach: "[current_agency_other_relation_list]"
        value: "[relation_id]"
        save_field: current_agency_other_relation_id_list
      - key: update_field
        fields:
          - field: biz_type
            template: "{{if .biz_type}}{{.biz_type}}{{else}}{{.current_agency_info.biz_type}}{{end}}"
          - field: status
            template: "{{if .status}}{{.status}}{{else}}{{.current_agency_info.status}}{{end}}"
          - field: checkin_status
            template: "{{if .checkin_status}}{{.checkin_status}}{{else}}{{.current_agency_info.checkin_status}}{{end}}"
          - field: wx_sync_enabled
            template: "{{if .wx_sync_enabled}}{{.wx_sync_enabled}}{{else}}{{.current_agency_info.wx_sync_enabled}}{{end}}"
      - key: service2field
        service:
          service: hrm.travel_agency_update
          agency_id: "[agency_id]"
          agency_name: "[agency_name]"
          agency_code: "[agency_code]"
          biz_type: "[biz_type]"
          status: "[status]"
          checkin_status: "[checkin_status]"
          wx_sync_enabled: "[wx_sync_enabled]"
          wx_sync_error_count: "[current_agency_info.wx_sync_error_count]"
          wx_sync_expire_time: "[current_agency_info.wx_sync_expire_time]"
          wx_sync_account: "[wx_sync_account]"
          wx_sync_password: "[wx_sync_password]"
          wx_sync_access_token: "[current_agency_info.wx_sync_access_token]"
          wx_sync_user_id: "[current_agency_info.wx_sync_user_id]"
          wx_sync_department_id: "[current_agency_info.wx_sync_department_id]"
          wx_sync_role_id: "[current_agency_info.wx_sync_role_id]"
          wx_sync_company_id: "[current_agency_info.wx_sync_company_id]"
          wx_last_sync_time: "[current_agency_info.wx_last_sync_time]"
          deepseek_api_key: "[deepseek_api_key]"
          logo_path: "[current_agency_info.logo_path]"
          description: "[description]"
          escape_system_prompt: "[current_agency_info.escape_system_prompt]"
          escape_user_prompt: "[current_agency_info.escape_user_prompt]"
          escape_repeat_ad_keywords: "[current_agency_info.escape_repeat_ad_keywords]"
        save_field: update_agency_result
      - key: service2field
        enable: "{{gt (len .target_other_agency_relation_id_list) 0}}"
        service:
          service: hrm.travel_checkin_relation_update_status_by_relation_id_list
          relation_id_list: "[target_other_agency_relation_id_list]"
          status: invalid
        save_field: target_relation_invalidate_result
      - key: service2field
        enable: "{{gt (len .current_agency_other_relation_id_list) 0}}"
        service:
          service: hrm.travel_checkin_relation_update_status_by_relation_id_list
          relation_id_list: "[current_agency_other_relation_id_list]"
          status: invalid
        save_field: current_relation_invalidate_result
      - key: service2field
        enable: "{{ne .current_agency_info.relation_user_id .relation_user_id}}"
        service:
          service: hrm.travel_checkin_relation_save_raw
          agency_id: "[agency_id]"
          user_id: "[relation_user_id]"
          role_type: admin
          description: "旅行社管理页修改关联用户"
        save_field: relation_save_result
      - key: service2field
        service:
          service: hrm.travel_checkin_user_company_role_ensure
          user_id: "[relation_user_id]"
        save_field: role_ensure_result
    result_handler:
      - key: params2result
        fields:
          - from: "[agency_id]"
            to: agency_id
          - from: "[relation_user_id]"
            to: relation_user_id

  - key: travel_checkin_apply_submit
    http: true
    must_login: false
    module: empty
    params:
      agency_name:
        check:
          template: "{{must .agency_name}}"
          err_msg: 旅行社名称不能为空
      agency_code:
        check:
          template: "{{must .agency_code}}"
          err_msg: 旅行社编码不能为空
      contact_name:
        check:
          template: "{{must .contact_name}}"
          err_msg: 联系人不能为空
      contact_phone:
        check:
          template: "{{must .contact_phone}}"
          err_msg: 联系手机号不能为空
      username:
        check:
          template: "{{must .username}}"
          err_msg: 同步账号不能为空
      password:
        check:
          template: "{{must .password}}"
          err_msg: 密码不能为空
      active_status_list:
        default: ["pending", "approved"]
    handler_params:
      - key: service2field
        service:
          service: hrm.travel_checkin_validate_account
          username: "[username]"
          password: "[password]"
        save_field: login_info
      - key: service2field
        service:
          service: hrm.travel_checkin_apply_list
          login_username: "[agency_code]"
          status_list: "[active_status_list]"
          active_only: true
          pagination: false
          count: false
        save_field: active_login_username_apply_list
        template: "{{eq (len .active_login_username_apply_list) 0}}"
        err_msg: 当前登录账号已存在待审或已通过的入住申请
      - key: service2field
        service:
          service: hrm.user_list
          username: "[agency_code]"
          pagination: false
          count: false
        save_field: local_login_user_list
        template: "{{eq (len .local_login_user_list) 0}}"
        err_msg: 当前登录账号已存在
      - key: service2field
        service:
          service: hrm.travel_checkin_apply_list
          agency_code: "[agency_code]"
          status_list: "[active_status_list]"
          active_only: true
          pagination: false
          count: false
        save_field: active_code_apply_list
        template: "{{eq (len .active_code_apply_list) 0}}"
        err_msg: 当前旅行社编码已存在待审或已通过的入住申请
      - key: service2field
        service:
          service: hrm.travel_agency_list
          agency_code: "[agency_code]"
          pagination: false
          count: false
        save_field: local_agency_list
        template: "{{eq (len .local_agency_list) 0}}"
        err_msg: 当前旅行社编码已存在
      - key: service2field
        service:
          service: hrm.travel_checkin_apply_save_raw
          agency_name: "[agency_name]"
          agency_code: "[agency_code]"
          contact_name: "[contact_name]"
          contact_phone: "[contact_phone]"
          username: "[username]"
          login_username: "[agency_code]"
          password: "[password]"
          user_id: ""
        save_field: save_result
    result_handler:
      - key: params2result
        fields:
          - from: "[save_result.apply_id]"
            to: apply_id
          - from: "[agency_name]"
