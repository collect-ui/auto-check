service:
  - key: sales_cs_user_list
    module: sql
    http: true
    params:
      search:
        template: "{{ if .search }}%{{.search}}%{{ end }}"
      page:
        type: int
        default: 1
      size:
        default: 20
        type: int
      start:
        template: " ({{.page}}-1) * {{.size}}"
        exec: true
        type: int
      pagination:
        default: true
      count:
        default: true
      role_id_list:
        default: ["sales", "customer_service"]
    data_file: query.sql
    count_file: count.sql
    pagination: pagination
    count: "[count]"

  - key: sales_cs_user_create
    module: empty
    http: true
    params:
      username:
        check:
          template: "{{must .username}}"
          err_msg: 用户名不能为空
      nick:
        check:
          template: "{{must .nick}}"
          err_msg: 昵称不能为空
      role_id_list:
        check:
          template: "{{must .role_id_list}}"
          err_msg: role_id_list不能为空
    handler_params:
      - key: service2field
        service:
          service: hrm.create_user_flow
          username: "[username]"
          nick: "[nick]"
          password: "[password]"
          phone: "[phone]"
          status: "[status]"
          role_id_list: "[role_id_list]"

  - key: sales_cs_user_update
    module: empty
    http: true
    params:
      user_id:
        check:
          template: "{{must .user_id}}"
          err_msg: 用户ID不能为空
      username:
        check:
          template: "{{must .username}}"
          err_msg: 用户名不能为空
      nick:
        check:
          template: "{{must .nick}}"
          err_msg: 昵称不能为空
      role_id_list:
        check:
          template: "{{must .role_id_list}}"
          err_msg: role_id_list不能为空
    handler_params:
      - key: service2field
        service:
          service: hrm.edit_user_flow
          user_id: "[user_id]"
          username: "[username]"
          nick: "[nick]"
          phone: "[phone]"
          status: "[status]"
          role_id_list: "[role_id_list]"

  - key: sales_cs_user_delete
    module: empty
    http: true
    params:
      user_id_list:
        check:
          template: "{{must .user_id_list}}"
          err_msg: 请选择要删除的用户
    handler_params:
      - key: service2field
        service:
          service: hrm.delete_user_by_user_id_list
          user_id_list: "[user_id_list]"
