service:
  - key: login
    name: qi_work 登录
    module: http
    http: true
    log: true
    success: "{{ if .access_token }}true{{ else }}false{{ end }}"
    params:
      username:
        check:
          template: "{{must .username}}"
          err_msg: 用户名不能为空
      password:
        check:
          template: "{{must .password}}"
          err_msg: 密码不能为空
    http_json: login.json
  - key: query_general
    name: qi_work 通话记录查询
    module: http
    http: true
    log: true
    params:
      authorization:
        check:
          template: "{{must .authorization}}"
          err_msg: authorization 不能为空
      companyId:
        check:
          template: "{{must .companyId}}"
          err_msg: companyId 不能为空
        type: "int"

      controlId:
        check:
          template: "{{must .controlId}}"
          err_msg: controlId 不能为空
        type: "int"
      loginUserId:
        check:
          template: "{{must .loginUserId}}"
          err_msg: loginUserId 不能为空
        type: "int"
      createDepartmentId:
        check:
          template: "{{must .createDepartmentId}}"
          err_msg: createDepartmentId 不能为空
        type: "int"
      startTime:
        default: 0
        check:
          template: "{{must .startTime}}"
          err_msg: startTime 不能为空
        template: "{{if .startTime}}{{.startTime}}{{else}}{{unix_time -30 `day`}}*1000{{end}}"
        exec: true
        type: int64
      endTime:
        default: 0
        check:
          template: "{{must .endTime}}"
          err_msg: endTime 不能为空
        template: "{{if .endTime}}{{.endTime}}{{else}}{{unix_time 0 `second`}}*1000{{end}}"
        exec: true
        type: int64
      pageSize:
        default: 10
      pageNum:
        default: 1
      appKey:
        default: "callRecord"
      sortField:
        default: "phoneId"
      sortOrder:
        default: "desc"
      viewDataRangeType:
        default: 3
    http_json: query_general.json
    result_handler:
      - key: result2params
        fields:
          - from: "[data.list]"
            to: "[list]"
      - key: param2result
        field: "[list]"
  - key: query_record
    name: qi_work 微信消息记录查询
    module: http
    http: true
    log: true
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
      authorization:
        check:
          template: "{{must .authorization}}"
          err_msg: authorization 不能为空
      companyId:
        check:
          template: "{{must .companyId}}"
          err_msg: companyId 不能为空
        type: int64
      controlId:
        check:
          template: "{{must .controlId}}"
          err_msg: controlId 不能为空
        type: int64
      loginUserId:
        check:
          template: "{{must .loginUserId}}"
          err_msg: loginUserId 不能为空
        type: int64
      createDepartmentId:
        check:
          template: "{{must .createDepartmentId}}"
          err_msg: createDepartmentId 不能为空
        type: int64
      userId:
        default: ""
        type: int64
      messageTimeFrom:
        default: 0
        check:
          template: "{{must .messageTimeFrom}}"
          err_msg: messageTimeFrom 不能为空
        template: "{{if .messageTimeFrom}}{{.messageTimeFrom}}{{else}}{{unix_time -30 `day`}}*1000{{end}}"
        exec: true
        type: int64
      messageTimeTo:
        default: 0
        check:
          template: "{{must .messageTimeTo}}"
          err_msg: messageTimeTo 不能为空
        template: "{{if .messageTimeTo}}{{.messageTimeTo}}{{else}}{{unix_time 0 `second`}}*1000{{end}}"
        exec: true
        type: int64
      start:
        default: 1
      limit:
        default: 1000
    http_json: query_record.json
    result_handler:
      - key: result2params
        fields:
          - from: "[data.list]"
            to: "[list]"
      - key: param2result
        field: "[list]"
  - key: query_chat_list
    name: 获取微信用户
    module: http
    http: true
    log: true
    params:
      authorization:
        check:
          template: "{{must .authorization}}"
          err_msg: authorization 不能为空
      companyId:
        check:
          template: "{{must .companyId}}"
          err_msg: companyId 不能为空
      controlId:
        check:
          template: "{{must .controlId}}"
          err_msg: controlId 不能为空
      loginUserId:
        check:
          template: "{{must .loginUserId}}"
          err_msg: loginUserId 不能为空
      createDepartmentId:
        check:
          template: "{{must .createDepartmentId}}"
          err_msg: createDepartmentId 不能为空
      wxId:
        check:
          template: "{{must .wxId}}"
          err_msg: 微信ID 不能为空
      # nickName:
      #   default: ""
      # search:
      #   default: ""
      start:
        default: 1
      limit:
        default: 20
    http_json: query_chat_list.json
    result_handler:
      - key: result2params
        fields:
          - from: "[data.list]"
            to: "[list]"
      - key: update_array
        enable: "{{must .employee_id}}"
        foreach: list
        item: item
        fields:
           - field: employee_id
             template: "[employee_id]" 
           - field: agency_id
             template: "[agency_id]" 
      - key: param2result
        field: "[list]"
  - key: query_user_wx
    name: 获取微信用户
    module: http
    http: true
    params:
      authorization:
        check:
          template: "{{must .authorization}}"
          err_msg: authorization 不能为空
      companyId:
        check:
          template: "{{must .companyId}}"
          err_msg: companyId 不能为空
      controlId:
        check:
          template: "{{must .controlId}}"
          err_msg: controlId 不能为空
      loginUserId:
        check:
          template: "{{must .loginUserId}}"
          err_msg: loginUserId 不能为空
      createDepartmentId:
        check:
          template: "{{must .createDepartmentId}}"
          err_msg: createDepartmentId 不能为空
      nickName:
        default: ""
      search:
        default: ""
      start:
        default: 1
      limit:
        default: 20
    http_json: query_user_wx.json
    result_handler:
      - key: result2params
        fields:
          - from: "[data.list]"
            to: "[list]"
      - key: prop_arr
        foreach: "[list]"
        append_item: true
        value: "[wxList]"
        save_field: list
      - key: param2result
        field: "[list]"
