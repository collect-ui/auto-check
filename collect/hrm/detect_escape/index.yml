    handler_params:
      - key: service2field
        name: 获取员工信息
        service:
          service: hrm.get_employee_info
          employee_id: "[employee_id]"
          to_obj: true
        save_field: employee_info
      - key: service2field
        name: 获取聊天记录
        service:
          service: hrm.get_chat_content_escape_order
