  - key: detect_escape_health_chunk_plan
    name: 月度体检分片规划
    http: true
    module: empty
    log: true
    params:
      employee_id:
        check:
          template: "{{must .employee_id}}"
          err_msg: employee_id不能为空
      start_time:
        default: 0
        template: "{{if .start_time}}{{.start_time}}{{else}}{{unix_time -30 `day`}}*1000{{end}}"
        exec: true
        type: int64
      end_time:
        default: 0
        template: "{{if .end_time}}{{.end_time}}{{else}}{{unix_time 0 `second`}}*1000{{end}}"
        exec: true
        type: int64
      max_days_per_chunk:
        default: 0
        type: int
      max_chat_count_per_chunk:
        default: 120
        type: int
      max_call_count_per_chunk:
        default: 20
        type: int
      max_chat_chars_per_chunk:
        default: 12000
        type: int
      max_call_chars_per_chunk:
        default: 6000
        type: int
    handler_params:
      - key: service2field
        name: 获取体检聊天明细
        service:
          service: hrm.travel_chat_record_list
          employee_id: "[employee_id]"
          message_time_from: "[start_time]"
          message_time_to: "[end_time]"
          limit: 100000
        save_field: chat_record_list
      - key: service2field
        name: 获取体检电话明细
        service:
          service: hrm.travel_call_record_list
          employee_id: "[employee_id]"
          start_time: "[start_time]"
          end_time: "[end_time]"
          limit: 100000
        save_field: call_record_list
      - key: health_chunk_plan
        name: 生成chunk列表
        foreach: "[chat_record_list]"
        right: "[call_record_list]"
        save_field: chunk_list
    result_handler:
      - key: param2result
        field: "[chunk_list]"

