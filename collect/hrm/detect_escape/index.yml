        name: 解析分片结果
        fields:
          - field: chunk_is_escape
            template: "{{if must .ai_result}}{{if str_contains (to_json .ai_result) `【本片结论】：有逃单`}}1{{else if str_contains (to_json .ai_result) `【本片结论】：无逃单`}}0{{else if or (str_contains (to_json .ai_result) `【有逃单行为】`) (str_contains (to_json .ai_result) `明确的高风险行为`) (str_contains (to_json .ai_result) `私下收款`) (str_contains (to_json .ai_result) `飞单`)}}1{{else if or (str_contains (to_json .ai_result) `存疑`) (str_contains (to_json .ai_result) `疑似`)}}2{{else}}2{{end}}{{else}}0{{end}}"
          - field: chunk_ai_result
            template: "{{if must .ai_result}}{{.ai_result}}{{else if eq (printf `%v` .preview_only) `1`}}预览模式：未调用模型接口{{else}}当前分片无有效聊天和电话消息，跳过模型分析{{end}}"
    result_handler:
      - key: params2result
        fields:
          - from: "[chunk_no]"
            to: chunk_no
          - from: "[chunk_start_time]"
            to: chunk_start_time
          - from: "[chunk_end_time]"
            to: chunk_end_time
          - from: "[chunk_prepare_data.chat_count]"
            to: chat_count
          - from: "[chunk_prepare_data.call_count]"
            to: call_count
          - from: "[chunk_prepare_data.system_prompt]"
            to: preview_system_prompt
          - from: "[chunk_prepare_data.prompt_content]"
            to: preview_prompt_content
          - from: "[chunk_prepare_data.chat_content]"
            to: preview_chat_content
          - from: "[chunk_prepare_data.call_content]"
            to: preview_call_content
          - from: "[chunk_ai_result]"
            to: ai_result
          - from: "[chunk_is_escape]"
            to: is_escape
          - from: "[preview_only]"
            to: preview_only

