  - key: call_deepseek_detect
    module: http
    log: true
    http: true
    params:
      system_prompt:
        default: "你是一个专业的销售行为分析助手，负责分析员工沟通记录（微信聊天记录与电话录音转写文本），判断员工是否存在逃单行为。逃单行为包括：引导客户更换联系方式（如加私人微信、换号码）、暗示私下交易、规避公司监管等。"
      prompt_content:
        check:
          template: "{{must .prompt_content}}"
          err_msg: prompt_content不能为空
    http_json: detect_escape.json
    result_handler:
      - key: result2params
