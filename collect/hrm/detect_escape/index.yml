  - key: detect_escape_health_merge
    name: 月度体检最终汇总
    module: empty
    http: true
    log: true
    params:
      employee_id:
        check:
          template: "{{must .employee_id}}"
          err_msg: employee_id不能为空
      chunk_result_list:
        default: []
    handler_params:
      - key: service2field
        name: 获取员工信息
        service:
          service: hrm.get_employee_info
          employee_id: "[employee_id]"
          to_obj: true
        save_field: employee_info
      - key: update_field
        name: 组装汇总提示词
        fields:
          - field: merge_system_prompt
            template: "{{if .employee_info.escape_system_prompt}}{{.employee_info.escape_system_prompt}}{{else}}你是一个专业的销售行为分析助手，负责分析员工沟通记录（微信聊天记录与电话录音转写文本），判断员工是否存在逃单行为。逃单行为包括：引导客户更换联系方式（如加私人微信、换号码）、暗示私下交易、规避公司监管等。{{end}}"
          - field: merge_prompt_content
            template: "现在进行月度逃单体检的最终汇总，请只基于下面各分片的分析结果输出整个月的最终结论，不要重新假设、补造或扩展不存在的事实。\n\n员工：{{.employee_info.employee_name}}\n旅行社：{{.employee_info.agency_name}}\n分片数量：{{len .chunk_result_list}}\n\n分片分析结果：\n{{range $i, $v := .chunk_result_list}}---\n分片{{if $v.analyze_result}}{{$v.analyze_result.Data.chunk_no}}{{else}}{{$v.chunk_no}}{{end}}（{{if $v.analyze_result}}{{$v.analyze_result.Data.chunk_start_time}}{{else}}{{$v.chunk_start_time}}{{end}} ~ {{if $v.analyze_result}}{{$v.analyze_result.Data.chunk_end_time}}{{else}}{{$v.chunk_end_time}}{{end}}）\n聊天条数：{{if $v.analyze_result}}{{$v.analyze_result.Data.chat_count}}{{else}}{{$v.chat_count}}{{end}}，电话条数：{{if $v.analyze_result}}{{$v.analyze_result.Data.call_count}}{{else}}{{$v.call_count}}{{end}}\n分片结论：{{if $v.analyze_result}}{{$v.analyze_result.Data.ai_result}}{{else}}{{$v.ai_result}}{{end}}\n{{end}}\n\n汇总要求：\n1. 不要在最终结论中出现“分片1”“分片7”“分片10”这类内部编号，必须改写成具体日期、时间范围或事件描述。\n2. 必须优先提取并呈现可审计的具体证据，尤其是：发生时间、群名或联系人名称、员工姓名/昵称、客户姓名/昵称、聊天原话或电话表述、前后沟通上下文。\n3. 对每条关键证据，尽量按“时间 + 群/联系人 + 说话人 + 关键表述 + 行为指向”组织。例如：2026-04-22，【熊堃】群，金秋称“不走平台，可以走线下”，属于引导脱离平台交易。\n4. 如果证据来自电话，写明“电话”以及通话时间、双方号码或可识别身份，并概括上下文；如果证据来自微信群或单聊，写明群名或联系人名。\n5. 如果分片结果里没有明确群名，就写联系人、电话号或可识别对象；如果没有精确时分秒，至少写清日期或分片时间范围，禁止只写模糊描述。\n6. “关键证据汇总”不要只做一句话总结，要按证据点逐条列出，体现沟通上下文，不少于3条；若有效证据不足3条，则按实际条数输出并明确“其余无更多明确证据”。\n7. “高风险联系人汇总”必须列出姓名、群名、微信昵称、电话号等已出现的具体对象，并说明关联风险行为；没有则写“无”。\n8. 只有在证据能够支持时才判定“有逃单行为”；若仅存在暧昧表述、客户单方表达或证据链不完整，要在总体判断或建议动作中明确写出待复核点。\n\n请严格按以下格式输出：\n【有逃单行为】或【无逃单行为】\n【总体判断】：先给整个月结论，再概括风险主线；必须包含时间分布、涉及群/联系人范围、主要违规动作类型\n【关键证据汇总】：逐条列出，每条尽量包含时间、群/联系人、说话人、上下文、关键原话/关键转述、风险指向\n【高风险联系人汇总】：列出联系人/群名及其对应风险行为，没有则写无\n【建议动作】：给出复核、取证、跟进建议"
      - key: service2field
        enable: "{{gt (len .chunk_result_list) 0}}"
        name: 调用大模型汇总
        service:
          service: hrm.call_deepseek_detect
          system_prompt: "[merge_system_prompt]"
          prompt_content: "[merge_prompt_content]"
        save_field: ai_result
      - key: update_field
        name: 解析汇总结果
        fields:
          - field: is_escape
            template: "{{if must .ai_result}}{{if str_contains (to_json .ai_result) `【有逃单行为】`}}1{{else if str_contains (to_json .ai_result) `【无逃单行为】`}}0{{else if or (str_contains (to_json .ai_result) `明确的高风险行为`) (str_contains (to_json .ai_result) `私下收款`) (str_contains (to_json .ai_result) `飞单`)}}1{{else if or (str_contains (to_json .ai_result) `存疑`) (str_contains (to_json .ai_result) `疑似`)}}2{{else}}2{{end}}{{else}}0{{end}}"
          - field: ai_content
            template: "{{if must .ai_result}}{{.ai_result}}{{else}}体检未获取到有效分片分析结果{{end}}"
    result_handler:
      - key: params2result
        fields:
          - from: "[employee_info]"
            to: employee_info
          - from: "[merge_system_prompt]"
            to: system_prompt
          - from: "[merge_prompt_content]"
            to: prompt_content
          - from: "[ai_content]"
            to: result
          - from: "[is_escape]"
            to: is_escape
          - from: "[chunk_result_list]"
            to: chunk_result_list

