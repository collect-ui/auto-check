            template: "{{len .call_list}}"
          - field: should_analyze
            template: "{{if or (gt (len .chat_list) 0) (gt (len .call_list) 0)}}1{{else}}0{{end}}"
          - field: skip_reason
            template: "{{if or (gt (len .chat_list) 0) (gt (len .call_list) 0)}}{{else}}SKIP_NO_MESSAGE{{end}}"
          - field: chat_latest_message_time
            template: "0"
          - field: call_latest_phone_time
            template: "{{range $i, $v := .call_list}}{{if eq $i 0}}{{$v.phone_start_time}}{{end}}{{else}}0{{end}}"
      - key: service2field
        enable: "{{eq .should_analyze \"1\"}}"
        name: 调用DeepSeek分析
        service:
          service: hrm.call_deepseek_detect
          system_prompt: "[system_prompt]"
          prompt_content: "[prompt_content]"
        save_field: ai_result
      - key: update_field
        name: 解析AI返回结果
        fields:
          - field: is_escape
            template: "{{if eq .should_analyze \"1\"}}{{if str_contains (to_json .ai_result) `【有逃单行为】`}}1{{else if str_contains (to_json .ai_result) `【无逃单行为】`}}0{{else if or (str_contains (to_json .ai_result) `存在明确的高风险行为`) (str_contains (to_json .ai_result) `明确的高风险行为`) (str_contains (to_json .ai_result) `私下收款`) (str_contains (to_json .ai_result) `飞单`)}}1{{else if or (str_contains (to_json .ai_result) `存疑`) (str_contains (to_json .ai_result) `疑似`) (str_contains (to_json .ai_result) `倾向`) (str_contains (to_json .ai_result) `可能性`)}}2{{else}}2{{end}}{{else}}0{{end}}"
          - field: ai_content
            template: "{{if eq .should_analyze \"1\"}}{{if (must .ai_result)}}{{.ai_result}}{{else}}分析失败：模型无返回，请重试{{end}}{{else}}无聊天和电话消息，跳过分析{{end}}"
    result_handler:
      - key: params2result
        fields:
          - from: "[is_escape]"
            to: is_escape
          - from: "[ai_content]"
            to: result
          - from: "[employee_info]"
            to: employee_info
          - from: "[chat_content]"
            to: chat_content
          - from: "[call_content]"
            to: call_content
          - from: "[system_prompt]"
            to: system_prompt
          - from: "[prompt_content]"
            to: prompt_content
          - from: "[chat_count]"
            to: chat_count
          - from: "[call_count]"
            to: call_count
          - from: "[should_analyze]"
            to: should_analyze
          - from: "[skip_reason]"
            to: skip_reason
          - from: "[chat_latest_message_time]"
            to: chat_latest_message_time
          - from: "[call_latest_phone_time]"
            to: call_latest_phone_time

  - key: detect_escape_order_and_save
    name: 检测逃单并回写员工结果
    http: true
    module: empty
    log: true
    params:
      employee_id:
        check:
          template: "{{must .employee_id}}"
          err_msg: employee_id不能为空
      limit:
        default: 300
      days:
        default: 2
      analyze_source:
        default: manual
      max_prompt_length:
        default: 20000
    handler_params:
      - key: service2field
        name: 调用逃单分析
        service:
          service: hrm.detect_escape_order
          employee_id: "[employee_id]"
          limit: "[limit]"
          days: "[days]"
          max_prompt_length: "[max_prompt_length]"
        save_field: detect_result
      - key: update_field
        name: 准备回写字段
        fields:
          - field: escape_is_escape
            template: "[detect_result.is_escape]"
          - field: escape_ai_content
            template: "[detect_result.result]"
          - field: escape_last_analyze_time
            template: "{{current_date_time}}"
          - field: modify_time
            template: "{{current_date_time}}"
          - field: escape_log_ai_result
            template: "[detect_result.result]"
          - field: escape_log_is_escape
            template: "[detect_result.is_escape]"
          - field: escape_log_agency_id
            template: "{{.detect_result.employee_info.agency_id}}"
          - field: escape_log_employee_name
            template: "{{.detect_result.employee_info.employee_name}}"
          - field: escape_log_system_prompt
            template: "[detect_result.system_prompt]"
          - field: escape_log_prompt_content
            template: "[detect_result.prompt_content]"
          - field: escape_log_chat_count
            template: "[detect_result.chat_count]"
          - field: escape_log_call_count
            template: "[detect_result.call_count]"
          - field: escape_log_chat_latest_message_time
            template: "[detect_result.chat_latest_message_time]"
          - field: escape_log_call_latest_phone_time
            template: "[detect_result.call_latest_phone_time]"
      - key: service2field
        name: 记录分析日志
        service:
          service: hrm.detect_escape_analyze_log_save
          employee_id: "[employee_id]"
          agency_id: "[escape_log_agency_id]"
          employee_name: "[escape_log_employee_name]"
          analyze_source: "[analyze_source]"
          system_prompt: "[escape_log_system_prompt]"
          prompt_content: "[escape_log_prompt_content]"
          ai_result: "[escape_log_ai_result]"
          is_escape: "[escape_log_is_escape]"
          chat_count: "[escape_log_chat_count]"
          call_count: "[escape_log_call_count]"
          chat_latest_message_time: "[escape_log_chat_latest_message_time]"
          call_latest_phone_time: "[escape_log_call_latest_phone_time]"
          create_time: "[escape_last_analyze_time]"
        save_field: escape_log_save_result
      - key: service2field
        name: 回写员工分析结果
        service:
          service: hrm.travel_employee_update_escape_result
          employee_id: "[employee_id]"
          escape_is_escape: "[escape_is_escape]"
          escape_ai_content: "[escape_ai_content]"
          escape_last_analyze_time: "[escape_last_analyze_time]"
          modify_time: "[modify_time]"
        save_field: save_result
    result_handler:
      - key: params2result
        fields:
          - from: "[employee_id]"
            to: employee_id
          - from: "[detect_result]"
            to: detect_result
          - from: "[escape_log_save_result]"
            to: escape_log_save_result
          - from: "[save_result]"
            to: save_result

  - key: detect_escape_order_and_save_bulk
    name: 批量检测逃单并回写
    module: bulk_service
    http: true
    log: true
    params:
      employee_list:
        default: []
      limit:
        default: 200
      days:
        default: 2
      analyze_source:
        default: schedule
      max_prompt_length:
        default: 20000
    batch:
      foreach: "[employee_list]"
      item: item
      loop_max: 1
      service:
        service: hrm.detect_escape_order_and_save
        employee_id: "[employee_id]"
        limit: "[params.limit]"
        days: "[params.days]"
        max_prompt_length: "[params.max_prompt_length]"
        analyze_source: "[params.analyze_source]"
      save_field: detect_result
      append_item_param: true

  - key: detect_escape_order_manual_bulk
    name: 手动分析（当前旅行社）
    http: true
    module: empty
    log: true
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: agency_id不能为空
      limit:
        default: 200
      days:
        default: 2
      employee_limit:
        default: 5000
      max_prompt_length:
        default: 20000
      analyze_source:
        default: manual_bulk
      analyze_strategy:
        default: force
    handler_params:
      - key: service2field
        enable: "{{eq .analyze_strategy \"force\"}}"
        name: 查询当前旅行社员工
        service:
          service: hrm.travel_employee_list
          agency_id: "[agency_id]"
          pagination: false
          count: false
          size: "[employee_limit]"
        save_field: agency_employee_list
      - key: service2field
        enable: "{{ne .analyze_strategy \"force\"}}"
        name: 查询当前旅行社增量员工
        service:
          service: hrm.get_need_detect_escape_employee_list
          agency_id: "[agency_id]"
          limit: "[employee_limit]"
        save_field: agency_employee_list
      - key: service2field
        enable: "{{gt (len .agency_employee_list) 0}}"
        name: 批量分析并回写
        service:
          service: hrm.detect_escape_order_and_save_bulk
          employee_list: "[agency_employee_list]"
          limit: "[limit]"
          days: "[days]"
          max_prompt_length: "[max_prompt_length]"
          analyze_source: "[analyze_source]"
        save_field: bulk_result
    result_handler:
      - key: params2result
        fields:
          - from: "[agency_id]"
            to: agency_id
          - from: "[analyze_strategy]"
            to: analyze_strategy
          - from: "[agency_employee_list]"
            to: employee_list
          - from: "[bulk_result]"
            to: bulk_result

  - key: detect_escape_order_schedule
    name: 逃单检测定时任务
    module: empty
    http: true
    log: true
    schedule:
      name: "每10分钟检测一次逃单行为"
      enable: "{{eq (get_key \"wechat_schedule_enable\") \"true\"}}"
      schedule_spec: "@every 600s"
    params:
      agency_id:
        default: ""
      limit:
        default: 200
      days:
        default: 2
      employee_limit:
        default: 500
      max_prompt_length:
        default: 20000
      analyze_source:
        default: schedule
      analyze_strategy:
        default: incremental
    handler_params:
      - key: service2field
        enable: "{{eq .analyze_strategy \"force\"}}"
        name: 查询强制分析员工
        service:
          service: hrm.travel_employee_list
          agency_id: "[agency_id]"
          pagination: false
          count: false
          size: "[employee_limit]"
        save_field: need_detect_employee_list
      - key: service2field
        enable: "{{ne .analyze_strategy \"force\"}}"
        name: 查询增量分析员工
        service:
          service: hrm.get_need_detect_escape_employee_list
          agency_id: "[agency_id]"
          limit: "[employee_limit]"
        save_field: need_detect_employee_list
      - key: service2field
        enable: "{{gt (len .need_detect_employee_list) 0}}"
        name: 批量分析并回写
        service:
          service: hrm.detect_escape_order_and_save_bulk
          employee_list: "[need_detect_employee_list]"
          limit: "[limit]"
          days: "[days]"
