          chunk_no: "[chunk_no]"
          chunk_start_time: "[chunk_start_time]"
          chunk_end_time: "[chunk_end_time]"
          limit: "[limit]"
          call_limit: "[call_limit]"
          single_chat_text_limit: "[single_chat_text_limit]"
          max_chat_content_length: "[max_chat_content_length]"
          max_call_content_length: "[max_call_content_length]"
        save_field: chunk_prepare_data
      - key: service2field
        enable: "{{and (ne (printf `%v` .preview_only) `1`) (or (ne .chunk_prepare_data.chat_count `0`) (ne .chunk_prepare_data.call_count `0`))}}"
        name: 调用大模型分析当前分片
        service:
          service: hrm.call_deepseek_detect
