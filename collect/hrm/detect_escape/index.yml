          max_chat_count_per_chunk: "[max_chat_count_per_chunk]"
          max_call_count_per_chunk: "[max_call_count_per_chunk]"
          max_chat_chars_per_chunk: "[max_chat_chars_per_chunk]"
          max_call_chars_per_chunk: "[max_call_chars_per_chunk]"
        save_field: chunk_list
      - key: service2field
        enable: "{{gt (len .chunk_list) 0}}"
        name: 批量准备分片提示词
        service:
          service: hrm.detect_escape_health_chunk_prepare_bulk
          employee_id: "[employee_id]"
          chunk_list: "[chunk_list]"
          limit: "[limit]"
          call_limit: "[call_limit]"
          single_chat_text_limit: "[single_chat_text_limit]"
          max_chat_content_length: "[max_chat_content_length]"
          max_call_content_length: "[max_call_content_length]"
        save_field: chunk_prompt_list
      - key: update_field
        name: 生成汇总提示模板
        fields:
          - field: merge_prompt_template
            template: "月度体检汇总将只读取各分片分析结果，不会直接再次读取整个月原始消息。\n员工：{{.employee_info.employee_name}}\n旅行社：{{.employee_info.agency_name}}\n分片数量：{{len .chunk_list}}\n单条聊天文本阈值：{{.single_chat_text_limit}}\n{{range $i, $v := .chunk_list}}分片{{$v.chunk_no}}：{{$v.chunk_start_day}} ~ {{$v.chunk_end_day}}，聊天{{$v.chat_count}}条，电话{{$v.call_count}}条\n{{end}}"
          - field: preview_system_prompt
            template: "{{if .employee_info.escape_system_prompt}}{{.employee_info.escape_system_prompt}}{{else}}你是一个专业的销售行为分析助手，负责分析员工沟通记录（微信聊天记录与电话录音转写文本），判断员工是否存在逃单行为。逃单行为包括：引导客户更换联系方式（如加私人微信、换号码）、暗示私下交易、规避公司监管等。{{end}}"
          - field: preview_prompt_content
            template: "【体检时间范围】\n{{.start_time}} ~ {{.end_time}}\n\n【分片规划】\n{{range $i, $v := .chunk_list}}分片{{$v.chunk_no}}：{{$v.chunk_start_day}} ~ {{$v.chunk_end_day}}，聊天{{$v.chat_count}}条，电话{{$v.call_count}}条\n{{end}}\n【分片提示词】\n{{range $i, $v := .chunk_prompt_list}}====================\n分片{{$v.chunk_no}}\n时间：{{$v.chunk_start_time}} ~ {{$v.chunk_end_time}}\n聊天：{{$v.chat_count}}，电话：{{$v.call_count}}\n{{if $v.prompt_content}}{{$v.prompt_content}}{{else if $v.prepare_result.Msg}}[分片提示词生成失败]\n{{$v.prepare_result.Msg}}{{else if $v.prepare_result.msg}}[分片提示词生成失败]\n{{$v.prepare_result.msg}}{{else}}[无提示词内容]{{end}}\n{{end}}\n【汇总提示模板】\n{{.merge_prompt_template}}"
          - field: preview_chat_content
            template: "{{range $i, $v := .chunk_prompt_list}}====================\n分片{{$v.chunk_no}}\n时间：{{$v.chunk_start_time}} ~ {{$v.chunk_end_time}}\n{{if $v.chat_content}}{{$v.chat_content}}{{else if eq (printf `%v` $v.chat_count) `0`}}[无聊天内容]{{else if $v.prepare_result.Msg}}[分片聊天拼接生成失败]\n{{$v.prepare_result.Msg}}{{else if $v.prepare_result.msg}}[分片聊天拼接生成失败]\n{{$v.prepare_result.msg}}{{else}}[无聊天内容]{{end}}\n{{end}}"
          - field: preview_call_content
            template: "{{range $i, $v := .chunk_prompt_list}}====================\n分片{{$v.chunk_no}}\n时间：{{$v.chunk_start_time}} ~ {{$v.chunk_end_time}}\n{{if $v.call_content}}{{$v.call_content}}{{else if eq (printf `%v` $v.call_count) `0`}}[无电话内容]{{else if $v.prepare_result.Msg}}[分片电话拼接生成失败]\n{{$v.prepare_result.Msg}}{{else if $v.prepare_result.msg}}[分片电话拼接生成失败]\n{{$v.prepare_result.msg}}{{else}}[无电话内容]{{end}}\n{{end}}"
    result_handler:
      - key: params2result
        fields:
          - from: "[employee_info]"
            to: employee_info
          - from: "[start_time]"
            to: start_time
          - from: "[end_time]"
            to: end_time
          - from: "[single_chat_text_limit]"
            to: single_chat_text_limit
          - from: "[chunk_list]"
            to: chunk_list
          - from: "[chunk_prompt_list]"
            to: chunk_prompt_list
          - from: "[merge_prompt_template]"
            to: merge_prompt_template
          - from: "[preview_system_prompt]"
            to: system_prompt
          - from: "[preview_prompt_content]"
            to: prompt_content
          - from: "[preview_chat_content]"
            to: chat_content
          - from: "[preview_call_content]"
            to: call_content

  - key: detect_escape_health_order_and_save
    name: 月度体检并回写员工结果
    http: true
    module: empty
    log: true
    params:
      employee_id:
        check:
          template: "{{must .employee_id}}"
          err_msg: employee_id不能为空
      analyze_source:
        default: health_manual
      skip_sync:
        default: 0
        type: int
      run_modules:
        default:
          - sync
          - plan
          - analyze
          - merge
          - stats
          - log
          - issue
          - save
      sync_modules:
        default:
          - wechat_user
          - chat_contact
          - chat_record
          - call_record
          - gen_file_text
          - gen_call_record_text
      start_time:
        default: 0
        template: "{{if .start_time}}{{.start_time}}{{else}}{{unix_time -30 `day`}}*1000{{end}}"
        exec: true
        type: int64
      end_time:
        default: 0
        template: "{{if .end_time}}{{.end_time}}{{else}}{{unix_time 0 `second`}}*1000{{end}}"
        exec: true
        type: int64
      chunk_list:
        default: []
      chunk_result_list:
        default: []
      limit:
        default: 5000
      call_limit:
        default: 1000
      single_chat_text_limit:
        default: 20000
        type: int
      max_days_per_chunk:
        default: 0
        type: int
      max_chat_count_per_chunk:
        default: 120
        type: int
      max_call_count_per_chunk:
        default: 20
        type: int
      max_chat_chars_per_chunk:
        default: 12000
        type: int
      max_call_chars_per_chunk:
        default: 6000
        type: int
      max_chat_content_length:
        default: 30000
        type: int
      max_call_content_length:
        default: 10000
        type: int
    handler_params:
      - key: service2field
        name: 获取员工信息
        service:
          service: hrm.get_employee_info
          employee_id: "[employee_id]"
          to_obj: true
        save_field: employee_info
      - key: service2field
        name: 查询待处理逃单工单
        service:
          service: hrm.detect_escape_issue_list
          employee_id: "[employee_id]"
          issue_status: pending
          pagination: false
        save_field: pending_issue_list
      - key: service2field
        name: 先同步员工30天数据
        enable: "{{contains .run_modules `sync`}}"
        service:
          service: hrm.sync_employee_all_for_health
          agency_id: "[employee_info.agency_id]"
          employee_id: "[employee_id]"
          message_time_from: "[start_time]"
          message_time_to: "[end_time]"
          sync_modules: "[sync_modules]"
        # save_field: sync_result
      - key: service2field
        name: 生成体检分片规划
        enable: "{{contains .run_modules `plan`}}"
        service:
          service: hrm.detect_escape_health_chunk_plan
          employee_id: "[employee_id]"
          start_time: "[start_time]"
          end_time: "[end_time]"
          max_days_per_chunk: "[max_days_per_chunk]"
          max_chat_count_per_chunk: "[max_chat_count_per_chunk]"
          max_call_count_per_chunk: "[max_call_count_per_chunk]"
          max_chat_chars_per_chunk: "[max_chat_chars_per_chunk]"
          max_call_chars_per_chunk: "[max_call_chars_per_chunk]"
        save_field: chunk_list
      - key: service2field
        enable: "{{and (contains .run_modules `analyze`) (gt (len .chunk_list) 0)}}"
        name: 批量分析分片
        service:
          service: hrm.detect_escape_health_chunk_analyze_bulk
          employee_id: "[employee_id]"
          chunk_list: "[chunk_list]"
          limit: "[limit]"
          call_limit: "[call_limit]"
          single_chat_text_limit: "[single_chat_text_limit]"
          max_chat_content_length: "[max_chat_content_length]"
          max_call_content_length: "[max_call_content_length]"
          preview_only: "[preview_only]"
        save_field: chunk_result_list
      - key: update_array
        enable: "{{gt (len .chunk_result_list) 0}}"
        name: 扁平化分片分析结果
        foreach: "[chunk_result_list]"
        item: item
        fields:
          - field: chunk_no
            template: "[item.analyze_result.data.chunk_no]"
          - field: chunk_start_time
            template: "[item.analyze_result.data.chunk_start_time]"
          - field: chunk_end_time
            template: "[item.analyze_result.data.chunk_end_time]"
          - field: chat_count
            template: "[item.analyze_result.data.chat_count]"
          - field: call_count
            template: "[item.analyze_result.data.call_count]"
          - field: preview_system_prompt
            template: "[item.analyze_result.data.preview_system_prompt]"
          - field: preview_prompt_content
            template: "[item.analyze_result.data.preview_prompt_content]"
          - field: preview_chat_content
            template: "[item.analyze_result.data.preview_chat_content]"
          - field: preview_call_content
            template: "[item.analyze_result.data.preview_call_content]"
          - field: ai_result
            template: "[item.analyze_result.data.ai_result]"
          - field: is_escape
            template: "[item.analyze_result.data.is_escape]"
      - key: service2field
        enable: "{{and (ne (printf `%v` .preview_only) `1`) (contains .run_modules `merge`) (gt (len .chunk_result_list) 0)}}"
        name: 汇总分片分析结果
        service:
          service: hrm.detect_escape_health_merge
          employee_id: "[employee_id]"
          chunk_result_list: "[chunk_result_list]"
        save_field: merge_result
      - key: service2field
        name: 获取体检聊天总量
        enable: "{{contains .run_modules `stats`}}"
        service:
          service: hrm.travel_chat_record_list
          employee_id: "[employee_id]"
          message_time_from: "[start_time]"
          message_time_to: "[end_time]"
          limit: 100000
        save_field: full_chat_list
      - key: service2field
        name: 获取体检电话总量
        enable: "{{contains .run_modules `stats`}}"
        service:
          service: hrm.travel_call_record_list
          employee_id: "[employee_id]"
          start_time: "[start_time]"
          end_time: "[end_time]"
          limit: 100000
        save_field: full_call_list
      - key: update_field
        name: 准备回写字段
        fields:
          - field: escape_is_escape
            template: "{{if gt (len .chunk_result_list) 0}}{{.merge_result.is_escape}}{{else}}0{{end}}"
          - field: escape_ai_content
            template: "{{if gt (len .chunk_result_list) 0}}{{.merge_result.result}}{{else}}最近30天无聊天和电话消息，跳过月度体检{{end}}"
          - field: escape_last_analyze_time
            template: "{{current_date_time}}"
          - field: modify_time
            template: "{{current_date_time}}"
          - field: escape_log_ai_result
            template: "{{if gt (len .chunk_result_list) 0}}{{.merge_result.result}}{{else}}最近30天无聊天和电话消息，跳过月度体检{{end}}"
          - field: escape_log_is_escape
            template: "{{if gt (len .chunk_result_list) 0}}{{.merge_result.is_escape}}{{else}}0{{end}}"
          - field: escape_log_agency_id
            template: "[employee_info.agency_id]"
          - field: escape_log_employee_name
            template: "[employee_info.employee_name]"
          - field: escape_log_system_prompt
            template: "{{if gt (len .chunk_result_list) 0}}{{.merge_result.system_prompt}}{{else}}月度体检无有效分片，无需调用汇总模型{{end}}"
          - field: escape_log_prompt_content
            template: "{{if gt (len .chunk_result_list) 0}}{{.merge_result.prompt_content}}{{else}}最近30天无聊天和电话消息，跳过月度体检{{end}}"
          - field: escape_log_chat_count
            template: "{{if .full_chat_list}}{{len .full_chat_list}}{{else}}0{{end}}"
          - field: escape_log_call_count
            template: "{{if .full_call_list}}{{len .full_call_list}}{{else}}0{{end}}"
      - key: service2field
        name: 记录分析日志
        enable: "{{contains .run_modules `log`}}"
        service:
          service: hrm.detect_escape_analyze_log_save
          employee_id: "[employee_id]"
          agency_id: "[escape_log_agency_id]"
          employee_name: "[escape_log_employee_name]"
          analyze_source: "[analyze_source]"
          system_prompt: "[escape_log_system_prompt]"
          prompt_content: "[escape_log_prompt_content]"
          ai_result: "[escape_log_ai_result]"
          is_escape: "[escape_log_is_escape]"
          chat_count: "[escape_log_chat_count]"
          call_count: "[escape_log_call_count]"
          create_time: "[escape_last_analyze_time]"
        save_field: escape_log_save_result
      - key: service2field
        name: 自动创建逃单待处理工单
        enable: "{{and (contains .run_modules `issue`) (eq .escape_log_is_escape `1`) (le (len .pending_issue_list) 0)}}"
        service:
          service: hrm.detect_escape_issue_save
          employee_id: "[employee_id]"
          agency_id: "[escape_log_agency_id]"
          employee_name: "[escape_log_employee_name]"
          issue_status: pending
          issue_reason: 月度体检检测到逃单行为
          issue_detail: "[escape_log_ai_result]"
          source_log_id: "[escape_log_save_result.log_id]"
          create_time: "[escape_last_analyze_time]"
          last_modify_time: "[escape_last_analyze_time]"
        save_field: issue_save_result
      - key: service2field
        name: 回写员工分析结果
        enable: "{{contains .run_modules `save`}}"
        service:
          service: hrm.travel_employee_update_escape_result
          employee_id: "[employee_id]"
          escape_is_escape: "[escape_is_escape]"
          escape_ai_content: "[escape_ai_content]"
          escape_last_analyze_time: "[escape_last_analyze_time]"
          modify_time: "[modify_time]"
        save_field: save_result
    result_handler:
      - key: params2result
        fields:
          - from: "[employee_id]"
            to: employee_id
        #   - from: "[sync_result]"
        #     to: sync_result
          - from: "[chunk_list]"
            to: chunk_list
          - from: "[chunk_result_list]"
            to: chunk_result_list
          - from: "[merge_result]"
            to: merge_result
          - from: "[escape_log_save_result]"
            to: escape_log_save_result
          - from: "[issue_save_result]"
            to: issue_save_result
          - from: "[save_result]"
            to: save_result
          - from: "[run_modules]"
            to: run_modules
          - from: "[sync_modules]"
            to: sync_modules
          - from: "[preview_only]"
            to: preview_only
          - from: "[start_time]"
            to: start_time
          - from: "[end_time]"
            to: end_time
          - from: "[employee_info]"
            to: employee_info

  - key: detect_escape_order_and_save
    name: 检测逃单并回写员工结果
    http: true
    module: empty
    log: true
    params:
      employee_id:
        check:
          template: "{{must .employee_id}}"
          err_msg: employee_id不能为空
      limit:
        default: 300
      days:
        default: 2
      analyze_source:
        default: manual
      max_prompt_length:
        default: 20000
    handler_params:
      - key: service2field
        name: 查询待处理逃单工单
        service:
          service: hrm.detect_escape_issue_list
          employee_id: "[employee_id]"
          issue_status: pending
          pagination: false
        save_field: pending_issue_list
      - key: service2field
        name: 调用逃单分析
        enable: "{{le (len .pending_issue_list) 0}}"
        service:
          service: hrm.detect_escape_order
          employee_id: "[employee_id]"
          limit: "[limit]"
          days: "[days]"
          max_prompt_length: "[max_prompt_length]"
        save_field: detect_result
      - key: update_field
        name: 准备回写字段
        fields:
          - field: escape_is_escape
            template: "{{if gt (len .pending_issue_list) 0}}1{{else}}{{.detect_result.is_escape}}{{end}}"
          - field: escape_ai_content
            template: "{{if gt (len .pending_issue_list) 0}}存在{{len .pending_issue_list}}条待处理逃单工单，跳过重复分析，维持逃单状态，待工单处理后再重新分析。{{else}}{{.detect_result.result}}{{end}}"
          - field: escape_last_analyze_time
            template: "{{current_date_time}}"
          - field: modify_time
            template: "{{current_date_time}}"
          - field: escape_log_ai_result
            template: "{{if gt (len .pending_issue_list) 0}}存在{{len .pending_issue_list}}条待处理逃单工单，跳过重复分析，维持逃单状态。{{else}}{{.detect_result.result}}{{end}}"
          - field: escape_log_is_escape
            template: "{{if gt (len .pending_issue_list) 0}}1{{else}}{{.detect_result.is_escape}}{{end}}"
          - field: escape_log_agency_id
            template: "{{if gt (len .pending_issue_list) 0}}{{(index .pending_issue_list 0).agency_id}}{{else}}{{.detect_result.employee_info.agency_id}}{{end}}"
          - field: escape_log_employee_name
            template: "{{if gt (len .pending_issue_list) 0}}{{(index .pending_issue_list 0).employee_name}}{{else}}{{.detect_result.employee_info.employee_name}}{{end}}"
          - field: escape_log_system_prompt
            template: "{{if gt (len .pending_issue_list) 0}}待处理工单短路，未再次调用分析模型{{else}}{{.detect_result.system_prompt}}{{end}}"
          - field: escape_log_prompt_content
            template: "{{if gt (len .pending_issue_list) 0}}待处理工单存在，跳过本次提示词与模型分析{{else}}{{.detect_result.prompt_content}}{{end}}"
          - field: escape_log_chat_count
            template: "{{if gt (len .pending_issue_list) 0}}0{{else}}{{.detect_result.chat_count}}{{end}}"
          - field: escape_log_call_count
            template: "{{if gt (len .pending_issue_list) 0}}0{{else}}{{.detect_result.call_count}}{{end}}"
          - field: escape_log_chat_latest_message_time
            template: "{{if gt (len .pending_issue_list) 0}}0{{else}}{{.detect_result.chat_latest_message_time}}{{end}}"
          - field: escape_log_call_latest_phone_time
            template: "{{if gt (len .pending_issue_list) 0}}0{{else}}{{.detect_result.call_latest_phone_time}}{{end}}"
          - field: escape_log_chat_latest_analyze_time
            template: "{{if gt (len .pending_issue_list) 0}}{{else}}{{.detect_result.chat_latest_analyze_time}}{{end}}"
          - field: escape_log_call_latest_analyze_time
            template: "{{if gt (len .pending_issue_list) 0}}{{else}}{{.detect_result.call_latest_analyze_time}}{{end}}"
      - key: service2field
        name: 记录分析日志
        service:
          service: hrm.detect_escape_analyze_log_save
          employee_id: "[employee_id]"
          agency_id: "[escape_log_agency_id]"
          employee_name: "[escape_log_employee_name]"
          analyze_source: "[analyze_source]"
          system_prompt: "[escape_log_system_prompt]"
          prompt_content: "[escape_log_prompt_content]"
          ai_result: "[escape_log_ai_result]"
          is_escape: "[escape_log_is_escape]"
          chat_count: "[escape_log_chat_count]"
          call_count: "[escape_log_call_count]"
          chat_latest_message_time: "[escape_log_chat_latest_message_time]"
          call_latest_phone_time: "[escape_log_call_latest_phone_time]"
          chat_latest_analyze_time: "[escape_log_chat_latest_analyze_time]"
          call_latest_analyze_time: "[escape_log_call_latest_analyze_time]"
          create_time: "[escape_last_analyze_time]"
        save_field: escape_log_save_result
      - key: service2field
        name: 自动创建逃单待处理工单
        enable: "{{and (eq .escape_log_is_escape `1`) (le (len .pending_issue_list) 0)}}"
        service:
          service: hrm.detect_escape_issue_save
          employee_id: "[employee_id]"
          agency_id: "[escape_log_agency_id]"
          employee_name: "[escape_log_employee_name]"
          issue_status: pending
          issue_reason: 检测到逃单行为
          issue_detail: "[escape_log_ai_result]"
          source_log_id: "[escape_log_save_result.log_id]"
          create_time: "[escape_last_analyze_time]"
          last_modify_time: "[escape_last_analyze_time]"
        save_field: issue_save_result
      - key: service2field
        name: 回写员工分析结果
        service:
          service: hrm.travel_employee_update_escape_result
          employee_id: "[employee_id]"
          escape_is_escape: "[escape_is_escape]"
          escape_ai_content: "[escape_ai_content]"
          escape_last_analyze_time: "[escape_last_analyze_time]"
          modify_time: "[modify_time]"
        save_field: save_result
    result_handler:
      - key: params2result
        fields:
          - from: "[employee_id]"
            to: employee_id
          - from: "[detect_result]"
            to: detect_result
          - from: "[pending_issue_list]"
            to: pending_issue_list
          - from: "[escape_log_save_result]"
            to: escape_log_save_result
          - from: "[issue_save_result]"
            to: issue_save_result
          - from: "[save_result]"
            to: save_result

  - key: detect_escape_order_and_save_bulk
    name: 批量检测逃单并回写
    module: bulk_service
    http: true
    log: true
    params:
      employee_list:
        default: []
      limit:
        default: 200
      days:
        default: 2
      analyze_source:
        default: schedule
      max_prompt_length:
        default: 20000
    batch:
      foreach: "[employee_list]"
      item: item
      loop_max: 1
      service:
        service: hrm.detect_escape_order_and_save
        employee_id: "[employee_id]"
        limit: "[params.limit]"
        days: "[params.days]"
        max_prompt_length: "[params.max_prompt_length]"
        analyze_source: "[params.analyze_source]"
      save_field: detect_result
      append_item_param: true

  - key: detect_escape_order_manual_bulk
    name: 手动分析（当前旅行社）
    http: true
    module: empty
    log: true
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: agency_id不能为空
      limit:
        default: 200
      days:
        default: 2
      employee_limit:
        default: 5000
      max_prompt_length:
        default: 20000
      analyze_source:
        default: manual_bulk
      analyze_strategy:
        default: force
    handler_params:
      - key: service2field
        enable: "{{eq .analyze_strategy \"force\"}}"
        name: 查询当前旅行社员工
        service:
          service: hrm.travel_employee_list
          agency_id: "[agency_id]"
          pagination: false
          count: false
          size: "[employee_limit]"
        save_field: agency_employee_list
      - key: service2field
        enable: "{{ne .analyze_strategy \"force\"}}"
        name: 查询当前旅行社增量员工
        service:
          service: hrm.get_need_detect_escape_employee_list
          agency_id: "[agency_id]"
          limit: "[employee_limit]"
        save_field: agency_employee_list
      - key: service2field
        enable: "{{gt (len .agency_employee_list) 0}}"
        name: 批量分析并回写
        service:
          service: hrm.detect_escape_order_and_save_bulk
          employee_list: "[agency_employee_list]"
          limit: "[limit]"
          days: "[days]"
          max_prompt_length: "[max_prompt_length]"
          analyze_source: "[analyze_source]"
        save_field: bulk_result
    result_handler:
      - key: params2result
        fields:
          - from: "[agency_id]"
            to: agency_id
          - from: "[analyze_strategy]"
            to: analyze_strategy
          - from: "[agency_employee_list]"
            to: employee_list
          - from: "[bulk_result]"
            to: bulk_result

  - key: detect_escape_order_schedule
