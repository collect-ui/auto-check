          - from: "[choices]"
            to: "[choices]"
      - key: param2result
        field: "[choices]"
      - key: arr2obj
      - key: result2params
        fields:
          - from: "[message.content]"
            to: "[content]"
      - key: param2result
        field: "[content]"

