            template: "{{if .employee_info.escape_system_prompt}}{{.employee_info.escape_system_prompt}}{{else}}你是一个专业的销售行为分析助手，负责分析员工沟通记录（微信聊天记录与电话录音转写文本），判断员工是否存在逃单行为。逃单行为包括：引导客户更换联系方式（如加私人微信、换号码）、暗示私下交易、规避公司监管等。{{end}}"
          - field: user_prompt_intro
            template: "{{if .employee_info.escape_merge_keyword_text}}{{if .employee_info.escape_user_prompt}}{{.employee_info.escape_user_prompt}}{{else}}请分析以下沟通记录（微信聊天记录 + 电话录音转写文本），判断员工【{{.employee_info.employee_name}}】（旅行社：{{.employee_info.agency_name}}）是否存在\"逃单\"行为。{{end}}\n\n重点关键词：\n{{.employee_info.escape_merge_keyword_text}}{{else if .employee_info.escape_user_prompt}}{{.employee_info.escape_user_prompt}}{{else}}请分析以下沟通记录（微信聊天记录 + 电话录音转写文本），判断员工【{{.employee_info.employee_name}}】（旅行社：{{.employee_info.agency_name}}）是否存在\"逃单\"行为。{{end}}"
          - field: health_chunk_notice
            template: "这是月度逃单体检中的第{{.chunk_no}}个分片，请只基于当前分片内容输出本片结论，不要直接输出整个月的最终结论。"
          - field: chat_content_for_prompt
            template: "{{.chat_content}}"
          - field: call_content_for_prompt
            template: "{{if gt (len .call_content) .max_call_content_length}}{{sub_str .call_content 0 .max_call_content_length}}\n...[当前分片电话内容已截断]{{else}}{{.call_content}}{{end}}"
          - field: prompt_content
            template: "{{.health_chunk_notice}}\n\n{{.user_prompt_intro}}\n\n分片时间范围：{{.chunk_start_time}} - {{.chunk_end_time}}\n\n微信聊天记录：\n{{if .chat_content_for_prompt}}{{.chat_content_for_prompt}}{{else}}（无）{{end}}\n\n电话录音转写：\n{{if .call_content_for_prompt}}{{.call_content_for_prompt}}{{else}}（无）{{end}}\n\n分片分析要求：\n1. 只基于当前分片提供的聊天和电话内容判断，不要补造事实，不要引用整月结论。\n2. 必须尽可能提取详细证据，优先保留：具体时间、群名或联系人名称、说话人、关键原话、前后上下文、行为指向。\n3. 如果证据来自微信群或单聊，写明群名或联系人；如果来自电话，写明“电话”以及通话时间、双方号码或可识别身份。\n4. 如果没有精确时分秒，至少写清日期或本分片时间范围；禁止只写“某天”“近期”“有客户”等模糊描述。\n5. “详细证据”必须逐条列出，尽量不少于3条；若明确证据不足3条，则按实际条数输出，并写明“其余无更多明确证据”。\n6. 每条证据尽量按以下顺序组织：时间 + 群/联系人 + 说话人 + 上下文 + 关键原话/关键转述 + 风险指向。\n7. 如果聊天里出现加微信、换联系方式、绕开平台、私下转账、第三方收款、不走公司、不走平台、不想交钱等内容，要完整保留上下文，不要只摘一句结论。\n8. “高风险联系人”必须列出具体对象及风险原因；没有则写无。\n9. “待复核点”必须写明证据链缺口，例如仅客户单方表达、关键信息缺失、对象身份未完全确认等；没有则写无。\n\n请严格按以下格式输出：\n【本片结论】：有逃单/无逃单/存疑\n【详细证据】：逐条列出，每条尽量包含时间、群/联系人、说话人、上下文、关键原话/关键转述、风险指向；没有则写无\n【高风险联系人】：列出联系人/群名及对应风险行为，没有则写无\n【待复核点】：列出待复核点，没有则写无\n【本片摘要】：100到250字，概括本片时间线、涉及对象、关键行为和结论"
          - field: chat_count
            template: "{{len .chat_list}}"
          - field: call_count
            template: "{{len .call_list}}"
    result_handler:
      - key: params2result
        fields:
          - from: "[chunk_no]"
            to: chunk_no
          - from: "[chunk_start_time]"
            to: chunk_start_time
          - from: "[chunk_end_time]"
            to: chunk_end_time
          - from: "[employee_info]"
            to: employee_info
          - from: "[system_prompt]"
            to: system_prompt
          - from: "[prompt_content]"
            to: prompt_content
          - from: "[chat_content]"
            to: chat_content
          - from: "[call_content]"
