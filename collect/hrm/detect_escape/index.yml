service:
  - key: detect_escape_prompt_preview
    name: 预览逃单分析提示词
    http: true
    module: empty
    log: true
    params:
      employee_id:
        check:
          template: "{{must .employee_id}}"
          err_msg: employee_id不能为空
      limit:
        default: 300
      days:
        default: 2
      call_limit:
        default: 50
      max_prompt_length:
        default: 20000
      max_chat_content_length:
        default: 30000
      max_call_content_length:
        default: 6000
    handler_params:
      - key: service2field
        name: 获取员工信息
        service:
          service: hrm.get_employee_info
          employee_id: "[employee_id]"
          to_obj: true
        save_field: employee_info
      - key: service2field
        name: 获取聊天记录
        service:
          service: hrm.get_chat_content_escape_order
          employee_id: "[employee_id]"
          limit: "[limit]"
          days: "[days]"
        save_field: chat_list
      - key: service2field
        name: 获取聊天分析时间
        service:
          service: hrm.get_chat_latest_analyze_time
          employee_id: "[employee_id]"
          days: "[days]"
        save_field: chat_analyze_time_data
      - key: service2field
        name: 获取电话录音转写记录
        service:
          service: hrm.get_call_content_escape_order
          employee_id: "[employee_id]"
          limit: "[call_limit]"
          days: "[days]"
        save_field: call_list
      - key: service2field
        name: 获取电话分析时间
        service:
          service: hrm.get_call_latest_analyze_time
          employee_id: "[employee_id]"
          days: "[days]"
        save_field: call_analyze_time_data
      - key: update_field
        name: 拼接聊天内容
        fields:
          - field: chat_content
            template: "{{range $i, $v := .chat_list}}【{{if $v.contact_name}}{{$v.contact_name}}{{else if $v.contact_wx_id}}{{$v.contact_wx_id}}{{else}}未知联系人{{end}}】{{$v.message_time_formatted}} {{if $v.group_user_wx_nick_name}}{{$v.group_user_wx_nick_name}}{{else if eq $v.message_type 0}}{{if $v.contact_name}}{{$v.contact_name}}{{else}}对方{{end}}{{else}}{{if $v.owner_nick_name}}{{$v.owner_nick_name}}{{else}}我{{end}}{{end}}: {{if $v.analysis_text}}{{$v.analysis_text}}{{else}}[空消息]{{end}}\n{{end}}"
      - key: update_field
        name: 拼接电话内容
        fields:
          - field: call_content
            template: "{{range $i, $v := .call_list}}{{if or (must $v.phone_record_text) (must $v.parsed_text)}}【电话】{{$v.phone_start_time_formatted}} {{$v.phone_out_number}} -> {{$v.phone_in_number}}: {{if $v.phone_record_text}}{{$v.phone_record_text}}{{else}}{{$v.parsed_text}}{{end}}\n{{end}}{{end}}"
      - key: update_field
        name: 生成系统提示词
        fields:
          - field: system_prompt
            template: "{{if .employee_info.escape_system_prompt}}{{.employee_info.escape_system_prompt}}{{else}}你是一个专业的销售行为分析助手，负责分析员工沟通记录（微信聊天记录与电话录音转写文本），判断员工是否存在逃单行为。逃单行为包括：引导客户更换联系方式（如加私人微信、换号码）、暗示私下交易、规避公司监管等。{{end}}"
      - key: update_field
        name: 生成普通提示词正文
        fields:
          - field: user_prompt_intro
            template: "{{if .employee_info.escape_merge_keyword_text}}{{if .employee_info.escape_user_prompt}}{{.employee_info.escape_user_prompt}}{{else}}请分析以下沟通记录（微信聊天记录 + 电话录音转写文本），判断员工【{{.employee_info.employee_name}}】（旅行社：{{.employee_info.agency_name}}）是否存在\"逃单\"行为。{{end}}\n\n重点关键词：\n{{.employee_info.escape_merge_keyword_text}}{{else if .employee_info.escape_user_prompt}}{{.employee_info.escape_user_prompt}}{{else}}请分析以下沟通记录（微信聊天记录 + 电话录音转写文本），判断员工【{{.employee_info.employee_name}}】（旅行社：{{.employee_info.agency_name}}）是否存在\"逃单\"行为。{{end}}"
      - key: update_field
        name: 分段截断聊天与电话内容
        fields:
          - field: chat_content_for_prompt
            template: "{{.chat_content}}"
          - field: call_content_for_prompt
            template: "{{if gt (len .call_content) .max_call_content_length}}{{sub_str .call_content 0 .max_call_content_length}}\n...[电话记录已按分段截断]{{else}}{{.call_content}}{{end}}"
      - key: update_field
        name: 拼接提示词
        fields:
          - field: prompt_content
            template: "{{.user_prompt_intro}}\n\n微信聊天记录：\n{{if .chat_content_for_prompt}}{{.chat_content_for_prompt}}{{else}}（无）{{end}}\n\n电话录音转写：\n{{if .call_content_for_prompt}}{{.call_content_for_prompt}}{{else}}（无）{{end}}\n\n判断标准：\n1. 是否引导客户更换联系方式（如\"加我另一个微信\"、\"换个号码\"）\n2. 是否暗示私下交易\n3. 是否规避公司监管\n\n重要：请在回复的第一行必须输出以下两个标记之一：\n- 如果有逃单行为，第一行输出：【有逃单行为】\n- 如果无逃单行为，第一行输出：【无逃单行为】\n\n然后在第二行开始输出分析内容：\n【判断理由】：具体理由\n【关键证据】：请分别给出聊天记录和电话录音中的关键证据（如果某一类无证据请明确写“无”）"
      - key: update_field
        name: 统计本轮样本信息
        fields:
          - field: chat_count
            template: "{{len .chat_list}}"
          - field: call_count
            template: "{{len .call_list}}"
          - field: chat_latest_message_time
            template: "{{if gt (len .chat_list) 0}}{{(index .chat_list 0).message_time}}{{else}}0{{end}}"
          - field: call_latest_phone_time
            template: "{{if gt (len .call_list) 0}}{{(index .call_list 0).phone_start_time}}{{else}}0{{end}}"
          - field: chat_latest_analyze_time
            template: "[chat_analyze_time_data.chat_latest_analyze_time]"
          - field: call_latest_analyze_time
            template: "[call_analyze_time_data.call_latest_analyze_time]"
    result_handler:
      - key: params2result
        fields:
          - from: "[employee_info]"
            to: employee_info
          - from: "[chat_content]"
            to: chat_content
          - from: "[call_content]"
            to: call_content
          - from: "[system_prompt]"
            to: system_prompt
          - from: "[prompt_content]"
            to: prompt_content
          - from: "[chat_count]"
            to: chat_count
          - from: "[call_count]"
            to: call_count
          - from: "[chat_analyze_time_data]"
            to: chat_analyze_time_data
          - from: "[call_analyze_time_data]"
            to: call_analyze_time_data
          - from: "[chat_latest_message_time]"
            to: chat_latest_message_time
          - from: "[call_latest_phone_time]"
            to: call_latest_phone_time
          - from: "[chat_latest_analyze_time]"
            to: chat_latest_analyze_time
          - from: "[call_latest_analyze_time]"
            to: call_latest_analyze_time

