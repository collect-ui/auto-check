service:
  - key: get_qi_work_token
    name: 获取企业微信token
    module: empty
    http: true
    log: true
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
    handler_params:
      # 1. 获取旅行社信息（使用to_obj转为对象）
      - key: service2field
        name: 获取旅行社信息
        service:
          service: hrm.travel_agency_list
          agency_id: "[agency_id]"
          to_obj: true
        save_field: agency_info
      
      # 2. 场景A：Token有效，从数据库返回字段
      - key: params2result
        name: Token有效，从数据库返回字段
        enable: "{{and .agency_info.wx_sync_access_token (gt .agency_info.wx_sync_expire_time (unix_time 5 `hour/milli`))}}"
        fields:
          - from: "[agency_info.wx_sync_access_token]"
            to: "access_token"
          - from: "[agency_info.wx_sync_company_id]"
            to: "companyId"
          - from: "[agency_info.wx_sync_user_id]"
            to: "userId"
          - from: "[agency_info.wx_sync_department_id]"
            to: "departmentId"
          - from: "[agency_info.wx_sync_role_id]"
            to: "roleId"
          - from: "[agency_info.wx_sync_user_id]"
            to: "controlId"
          - from: "[agency_info.wx_sync_access_token]"
            to: "authorization"
            template: "Bearer {{.agency_info.wx_sync_access_token}}"
      
      # 3. 场景B：Token无效，重新登录
      - key: service2field
        name: 场景B：Token无效，重新登录
        enable: "{{or (not .agency_info.wx_sync_access_token) (lt .agency_info.wx_sync_expire_time (unix_time 0 `second`))}}"
        service:
          service: spider_qi_work.login
          username: "[agency_info.wx_sync_account]"
          password: "[agency_info.wx_sync_password]"
        save_field: login_result
      
      # 4. 从登录结果提取字段
      - key: params2result
        enable: "{{must .login_result}}"
        fields:
          - from: "[login_result.access_token]"
            to: "authorization"
            template: "Bearer {{.login_result.access_token}}"
          - from: "[login_result.access_token]"
            to: "access_token"
          - from: "[login_result.companyId]"
            to: "companyId"
          - from: "[login_result.userId]"
            to: "userId"
          - from: "[login_result.departmentId]"
            to: "departmentId"
          - from: "[login_result.roleId]"
            to: "roleId"
          - from: "[login_result.userId]"
            to: "controlId"
      
      # 5. 更新数据库中的token
      - key: service2field
        name: "更新缓存信息"
        enable: "{{must .login_result}}"
        service:
          service: hrm.travel_agency_wx_update_simple
          agency_id: "[agency_id]"
          wx_sync_access_token: "[login_result.access_token]"
          wx_sync_company_id: "[login_result.companyId]"
          wx_sync_user_id: "[login_result.userId]"
          wx_sync_department_id: "[login_result.departmentId]"
          wx_sync_role_id: "[login_result.roleId]"
          wx_sync_expire_time: "[login_result.expireTime]"

  - key: get_travel_agency_phone_list
    name: 获取旅行社手机列表
    module: empty
    http: true
    log: true
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
      start:
        default: 1
      limit:
        default: 20
      viewDataRangeType:
        default: 3
    handler_params:
      # 1. 获取企业微信token
      - key: service2field
        service:
          service: hrm.get_qi_work_token
          agency_id: "[agency_id]"
        save_field: token_data
      
      # 2. 获取手机列表
      - key: service2field
        service:
          service: spider_qi_work.query_user_wx
          authorization: "[token_data.access_token]"
          companyId: "[token_data.companyId]"
          controlId: "[token_data.controlId]"
          loginUserId: "[token_data.userId]"
          createDepartmentId: "[token_data.departmentId]"
          depId: "[token_data.departmentId]"
          start: "[start]"
          limit: "[limit]"
          viewDataRangeType: "[viewDataRangeType]"
        save_field: phone_list
      
       # 3. 直接返回phone_list
      - key: param2result
        field: "[phone_list]"

  - key: sync_wechat_user
    name: 同步微信用户
    module: empty
    http: true
    log: true
    modify_config: "travel_employee_modify.json"
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
    handler_params:
      # 1. 获取微信用户列表
      - key: service2field
        name: 获取微信用户列表
        service:
          service: hrm.get_travel_agency_phone_list
          agency_id: "[agency_id]"
          start: 1
          limit: 1000
        save_field: wechat_list
      

      
      # 3. 映射微信字段到本地字段名
      - key: update_array
        foreach: "[wechat_list]"
        item: item
        fields:
          - field: wx_id
            template: "[item.wxId]"
          - field: nick_name
            template: "[item.nickName]"
          - field: ower_wx_alias
            template: "[item.owerWxAlias]"
          - field: phone
            template: "[item.phone]"
      
      # 4. 获取本地员工列表
      - key: service2field
        name: 获取本地员工列表
        service:
          service: hrm.travel_employee_list
          agency_id: "[agency_id]"
          pagination: false
        save_field: local_list
      
      # 5. 比较差异
      - key: get_modify_data
        name: 比较微信与本地用户差异
        save_field: change_list
      
      # 6. 分离新增、修改、删除列表
      - key: filter_arr
        foreach: "[change_list]"
        item: item
        if_template: "{{eq .item.operation \"add\"}}"
        save_field: add_list
      
      - key: filter_arr
        foreach: "[change_list]"
        item: item
        if_template: "{{eq .item.operation \"modify\"}}"
        save_field: modify_list
      
      - key: filter_arr
        foreach: "[change_list]"
        item: item
        if_template: "{{eq .item.operation \"remove\"}}"
        save_field: remove_list
      
      # 7. 处理新增用户
      - key: update_array
        enable: "{{gt (len .add_list) 0}}"
        foreach: "[add_list]"
        item: item
        fields:
          - field: employee_id
            template: "{{uuid}}"
          - field: agency_id
            template: "[agency_id]"
          - field: create_time
            template: "{{current_date_time}}"
          - field: create_user
            template: "{{.session_user_id}}"
          - field: status
            template: "normal"
          - field: wx_target
            template: "1"
      
      - key: service2field
        enable: "{{gt (len .add_list) 0}}"
        name: 批量新增用户
        service:
          service: hrm.travel_employee_bulk_create
          employee_list: "[add_list]"
      
      # 8. 处理修改用户
      - key: update_array
        enable: "{{gt (len .modify_list) 0}}"
        foreach: "[modify_list]"
        item: item
        fields:
          - field: modify_time
            template: "{{current_date_time}}"
          - field: modify_user
            template: "{{.session_user_id}}"
      
      - key: service2field
        enable: "{{gt (len .modify_list) 0}}"
        name: 批量修改用户
        service:
          service: hrm.travel_employee_bulk_update
          employee_list: "[modify_list]"
      
      # 9. 处理删除用户
      - key: prop_arr
        enable: "{{gt (len .remove_list) 0}}"
        foreach: "[remove_list]"
        value: "[employee_id]"
        save_field: remove_id_list
      
      - key: service2field
        enable: "{{gt (len .remove_id_list) 0}}"
        name: 批量删除用户
        service:
          service: hrm.travel_employee_bulk_delete
          employee_id_list: "[remove_id_list]"
      
      # 10. 返回同步结果用于调试
      - key: param2result
        field: "[change_list]"

  - key: sync_chat_contact
    name: 同步员工通讯录
    module: empty
    http: true
    log: true
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
      employee_id:
        check:
          template: "{{must .employee_id}}"
          err_msg: 员工ID不能为空
    handler_params:
      # 1. 获取员工信息
      - key: service2field
        name: 获取员工信息
        service:
          service: hrm.travel_employee_list
          agency_id: "[agency_id]"
          employee_id: "[employee_id]"
          pagination: false
          to_obj: true
        save_field: employee
      # 1. 获取企业微信token
      - key: service2field
        service:
          service: hrm.get_qi_work_token
          agency_id: "[agency_id]"
        save_field: token_data
      
      # 2. 获取微信聊天通讯录
      - key: service2field
        name: 获取聊天通讯录
        service:
          service: spider_qi_work.query_chat_list
          authorization: "[token_data.authorization]"
          companyId: "[token_data.companyId]"
          controlId: "[token_data.controlId]"
          loginUserId: "[token_data.userId]"
          createDepartmentId: "[token_data.departmentId]"
          wxId: "[employee.wx_id]"
          nickName: "[employee.nick_name]"
          userId: "[employee.user_id]"
          search: ""
          start: 1
          limit: 500
        save_field: chat_contact_raw_list
      
       # 3. 映射通讯录字段并添加agency_id
      - key: update_array
        enable: "{{gt (len .chat_contact_raw_list) 0}}"
        foreach: "[chat_contact_raw_list]"
        item: item
        fields:
          - field: contact_id
            template: "{{.item.wxId}}#{{.item.ownerWxId}}"
          - field: agency_id
            template: "[agency_id]"
          - field: employee_id
            template: "[employee_id]"
          - field: wx_id
            template: "[item.wxId]"
          - field: contact_nick_name
            template: "[item.contactNickName]"
          - field: nick_name
            template: "[item.nickName]"
          - field: is_group
            template: "{{ if str_contains .item.wxId `@chatroom`}}1{{else}}0{{end}}"

          - field: content
            template: "[item.content]"
          - field: message_time
            template: "[item.messageTime]"
          - field: owner_wx_id
            template: "[item.ownerWxId]"
          - field: person_count
            template: "[item.personCount]"
          - field: wx_alias
            template: "[item.wxAlias]"

          - field: create_time
            template: "{{current_date_time}}"
          - field: modify_time
            template: "{{current_date_time}}"
          - field: exists
            template: "0"
      - key: service2field
        name: 获取本地聊天群
        service:
          service: hrm.travel_chat_contact_list
          agency_id: "[agency_id]"
          employee_id: "[employee_id]"
        save_field: local_chat_contact_list
      - key: update_array_from_array
        name: ""
        foreach: "[chat_contact_raw_list]"
        item: item
        field: "[contact_id]"
        right: "[local_chat_contact_list]"
        right_field: "[contact_id]"
        fields:
          - field: exists
            template: "1"
      - key: filter_arr
        name: 过滤新增数组
        foreach: "[chat_contact_raw_list]"
        item: item
        if_template: "{{eq .item.exists `0`}}"
        save_field: add_list

      
       # 4. 批量保存通讯录（增量新增）
      - key: service2field
        enable: "{{gt (len .add_list) 0}}"
        name: 批量保存通讯录
        service:
          service: hrm.travel_chat_contact_bulk_create
          contact_list: "[add_list]"
      
      # 5. 返回同步结果
      - key: params2result
        fields:
          - from: "[chat_contact_list]"
            to: contact_list
          - from: "[chat_contact_raw_list]"
            to: chat_contact_raw_list
          - from: "[add_list]"
            to: add_list

  - key: sync_chat_record
    name: 同步聊天记录
    module: empty
    http: true
    log: true
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
      employee_id:
        check:
          template: "{{must .employee_id}}"
          err_msg: 员工ID不能为空
      contact_id:
        check:
          template: "{{must .contact_id}}"
          err_msg: 联系人ID不能为空
      message_time_from:
        default: 0
        check:
          template: "{{must .message_time_from}}"
          err_msg: 起始时间不能为空
        template: "{{if .message_time_from}}{{.message_time_from}}{{else}}{{unix_time -30 `day`}}*1000{{end}}"
        exec: true
        type: int64
      message_time_to:
        default: 0
        check:
          template: "{{must .message_time_to}}"
          err_msg: 结束时间不能为空
        template: "{{if .message_time_to}}{{.message_time_to}}{{else}}{{unix_time 0 `second`}}*1000{{end}}"
        exec: true
        type: int64
      add_list:
        default: []
      start:
        default: 1
      limit:
        default: 100
    handler_params:
      # 1. 获取员工信息
      - key: service2field
        name: 获取员工信息
        service:
          service: hrm.travel_employee_list
          agency_id: "[agency_id]"
          employee_id: "[employee_id]"
          pagination: false
          to_obj: true
        save_field: employee
      - key: service2field
        name: 获取联系人信息
        service:
          service: hrm.travel_chat_contact_list
          contact_id: "[contact_id]"
          to_obj: true
        save_field: contact
      
      # 2. 获取企业微信token
      - key: service2field
        name: 获取企业微信token
        service:
          service: hrm.get_qi_work_token
          agency_id: "[agency_id]"
        save_field: token_data

      # 3. 获取聊天记录
      - key: service2field
        name: 获取聊天记录
        service:
          service: spider_qi_work.query_record
          agency_id: "[agency_id]"
          authorization: "[token_data.authorization]"
          companyId: "[token_data.companyId]"
          controlId: "[token_data.controlId]"
          loginUserId: "[token_data.userId]"
          createDepartmentId: "[token_data.departmentId]"
          wxId: "[contact.wx_id]"
          ownerWxId: "[contact.owner_wx_id]"
          userId: "[employee.user_id]"
          messageTimeFrom: "[message_time_from]"
          messageTimeTo: "[message_time_to]"
          start: "[start]"
          limit: "[limit]"
        save_field: chat_record_raw_list

      # 4. 映射聊天记录字段
      - key: update_array
        name: 映射聊天记录字段
        enable: "{{gt (len .chat_record_raw_list) 0}}"
        foreach: "[chat_record_raw_list]"
        item: item
        fields:
          # 主键和关联字段
          - field: uid
            template: "[item.uid]"
          - field: agency_id
            template: "[agency_id]"
          - field: employee_id
            template: "[employee_id]"
          - field: contact_id
            template: "[contact_id]"

          # 微信基础字段
          - field: wx_id
            template: "[item.wxId]"
          - field: owner_wx_id
            template: "[item.ownerWxId]"
          - field: contact_nick_name
            template: "[item.contactNickName]"
          - field: owner_head
            template: "[item.ownerHead]"
          - field: owner_nick_name
            template: "[item.ownerNickName]"
          - field: nick_name
            template: "[item.nickName]"
          - field: head
            template: "[item.head]"
          - field: wx_alias
            template: "[item.wxAlias]"

          # 群聊字段
#          - field: is_group
#            template: "{{ if str_contains .item.wxId `@chatroom`}}1{{else}}0{{end}}"
          - field: group_user_wx_id
            template: "[item.groupUserWxId]"
          - field: group_user_wx_nick_name
            template: "[item.groupUserWxNickName]"
          - field: group_user_wx_head
            template: "[item.groupUserWxHead]"
          - field: group_user_wx_room_name
            template: "[item.groupUserWxRoomName]"

          # 消息内容字段
          - field: message_type
            template: "[item.messageType]"
          - field: content
            template: "[item.content]"
          - field: message_time
            template: "[item.messageTime]"
          - field: message_status
            template: "[item.messageStatus]"
          - field: wx_msg_id
            template: "[item.wxMsgId]"

          # 文件字段
          - field: file_name
            template: "[item.fileName]"
          - field: file_size
            template: "[item.fileSize]"
          - field: file_status
            template: "[item.fileStatus]"
          - field: file_url
            template: "[item.fileUrl]"

          # 链接字段
          - field: link_url
            template: "[item.linkUrl]"

          # 转账字段
          - field: transfer_money
            template: "[item.transferMoney]"
          - field: transfer_status
            template: "[item.transferStatus]"
          - field: receive_transfer_time
            template: "[item.receiveTransferTime]"
          - field: transcation_id
            template: "[item.transcationId]"

          # 红包字段
          - field: red_packet
            template: "[item.redPacket]"
          - field: red_packet_type
            template: "[item.redPacketType]"
          - field: red_packet_status
            template: "[item.redPacketStatus]"
          - field: red_packet_count
            template: "[item.redPacketCount]"
          - field: red_packet_end_time
            template: "[item.redPacketEndTime]"
          - field: red_packet_from_wx_id
            template: "[item.redPacketFromWxId]"
          - field: red_packet_from_wx_nick_name
            template: "[item.redPacketFromWxNickName]"

          # 通话字段
          - field: call_time
            template: "[item.callTime]"
          - field: start_call_time
            template: "[item.startCallTime]"
          - field: end_call_time
            template: "[item.endCallTime]"

          # 其他字段
          - field: message_check_time
            template: "[item.messageCheckTime]"
          - field: withdraw_time
            template: "[item.withdrawTime]"
          - field: user_nick_name
            template: "[item.userNickName]"
          - field: company_id
            template: "[item.companyId]"
          - field: dep_id
            template: "[item.depId]"
          - field: user_id
            template: "[item.userId]"

          # 系统字段
          - field: create_time
            template: "{{current_date_time}}"
          - field: modify_time
            template: "{{current_date_time}}"
          - field: exists
            template: "0"

      # 5. 获取本地聊天记录（用于去重）
      - key: service2field
        name: 获取本地聊天记录
        service:
          service: hrm.travel_chat_record_list
          agency_id: "[agency_id]"
          employee_id: "[employee_id]"
          contact_id: "[contact_id]"
          message_time_from: "[message_time_from]"
          message_time_to: "[message_time_to]"
        save_field: local_chat_record_list

      # 6. 标记已存在的记录
      - key: update_array_from_array
        name: 标记已存在记录
        foreach: "[chat_record_raw_list]"
        item: item
        field: "[uid]"
        right: "[local_chat_record_list]"
        right_field: "[uid]"
        fields:
          - field: exists
            template: "1"

      # 7. 过滤新增记录
      - key: filter_arr
        name: 过滤新增记录
        foreach: "[chat_record_raw_list]"
        item: item
        if_template: "{{eq .item.exists `0`}}"
        save_field: add_list

      # 8. 批量保存聊天记录
      - key: service2field
        enable: "{{gt (len .add_list) 0}}"
        name: 批量保存聊天记录
        service:
          service: hrm.travel_chat_record_bulk_create
          record_list: "[add_list]"

      # 9. 返回同步结果
      - key: params2result
        fields:
          - from: "[chat_record_raw_list]"
            to: chat_record_list
          - from: "[add_list]"
            to: add_list
          - from: "[local_chat_record_list]"
            to: local_count
            template: "{{len .local_chat_record_list}}"
            exec: true