service:
  - key: travel_agency_list
    http: true
    module: sql
    params:
      agency_id:
        default: ""
      agency_code:
        default: ""
      checkin_status:
        default: ""
      wx_sync_enabled:
        default: ""
      search:
        template: "{{ if .search }}%{{.search}}%{{ end }}"
      page:
        type: int
        default: 1
      size:
        default: 20
        type: int
      start:
        template: " ({{.page}}-1) * {{.size}}"
        exec: true
        type: int
      pagination:
        default: true
      count:
        default: true
      to_obj:
        default: false
    data_file: travel_agency_list.sql
    count_file: travel_agency_count.sql
    pagination: pagination
    count: "[count]"
    result_handler:
      - key: arr2obj
        enable: "[to_obj]"

  - key: travel_agency_prompt_rel_list
    http: true
    module: sql
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
      search:
        template: "{{ if .search }}%{{.search}}%{{ end }}"
    data_file: travel_agency_prompt_rel_list.sql

  - key: travel_escape_prompt_keyword_bulk_upsert
    http: true
    module: bulk_upsert
    table: travel_escape_prompt_keyword
    params:
      keyword_list:
        check:
          template: "{{must .keyword_list}}"
          err_msg: 关键词列表不能为空
    model_field: "[keyword_list]"

  - key: travel_agency_prompt_rel_delete_by_agency
    http: true
    module: model_delete
    table: travel_agency_escape_prompt_rel
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
    filter:
      agency_id: "[agency_id]"

  - key: travel_agency_prompt_rel_delete_by_agency_type
    http: true
    module: model_delete
    table: travel_agency_escape_prompt_rel
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
      prompt_type:
        check:
          template: "{{must .prompt_type}}"
          err_msg: prompt_type不能为空
    filter:
      agency_id: "[agency_id]"
      prompt_type: "[prompt_type]"

  - key: travel_agency_prompt_rel_save
    http: true
    module: model_save
    table: travel_agency_escape_prompt_rel
    params:
      rel_id:
        template: "{{uuid}}"
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
      prompt_type:
        check:
          template: "{{must .prompt_type}}"
          err_msg: prompt_type不能为空
      keyword:
        check:
          template: "{{must .keyword}}"
          err_msg: 关键词不能为空
      sort_no:
        default: 0
        type: int
      status:
        default: normal
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"

  - key: travel_agency_prompt_rel_update
    http: true
    module: model_update
    table: travel_agency_escape_prompt_rel
    params:
      rel_id:
        check:
          template: "{{must .rel_id}}"
          err_msg: rel_id不能为空
      keyword:
        check:
          template: "{{must .keyword}}"
