        save_field: escape_system_keyword_not_empty_list
      - key: group_by
        foreach: "[escape_system_keyword_not_empty_list]"
        children: children
        fields:
          - field: "[keyword]"
        save_field: escape_system_keyword_dedup_list
      - key: prop_arr
        foreach: "[escape_system_keyword_dedup_list]"
        value: "[keyword]"
        save_field: escape_system_keyword_text_list
      - key: update_field
        fields:
          - field: escape_system_prompt
            template: "{{if gt (len .escape_system_keyword_text_list) 0}}{{join .escape_system_keyword_text_list \"\\n\"}}{{else}}{{.escape_system_prompt}}{{end}}"

      - key: filter_arr
        foreach: "[escape_user_keyword_list]"
        item: item
        if_template: "{{must .item.keyword}}"
        save_field: escape_user_keyword_not_empty_list
      - key: group_by
        foreach: "[escape_user_keyword_not_empty_list]"
        children: children
        fields:
          - field: "[keyword]"
        save_field: escape_user_keyword_dedup_list
      - key: prop_arr
        foreach: "[escape_user_keyword_dedup_list]"
        value: "[keyword]"
        save_field: escape_user_keyword_text_list
      - key: update_field
        fields:
          - field: escape_user_prompt
            template: "{{if gt (len .escape_user_keyword_text_list) 0}}{{join .escape_user_keyword_text_list \"\\n\"}}{{else}}{{.escape_user_prompt}}{{end}}"

      - key: service2field
        service:
          service: hrm.travel_agency_save_raw
          agency_id: "[agency_id]"
          agency_name: "[agency_name]"
          agency_code: "[agency_code]"
          biz_type: "[biz_type]"
          status: "[status]"
          checkin_status: "[checkin_status]"
          wx_sync_enabled: "[wx_sync_enabled]"
          wx_sync_error_count: "[wx_sync_error_count]"
          wx_sync_expire_time: "[wx_sync_expire_time]"
          wx_sync_account: "[wx_sync_account]"
          wx_sync_password: "[wx_sync_password]"
          wx_sync_access_token: "[wx_sync_access_token]"
          wx_sync_user_id: "[wx_sync_user_id]"
          wx_sync_department_id: "[wx_sync_department_id]"
          wx_sync_role_id: "[wx_sync_role_id]"
          wx_sync_company_id: "[wx_sync_company_id]"
          wx_last_sync_time: "[wx_last_sync_time]"
          deepseek_api_key: "[deepseek_api_key]"
          logo_path: "[logo_path]"
          description: "[description]"
          escape_system_prompt: "[escape_system_prompt]"
          escape_user_prompt: "[escape_user_prompt]"
          escape_repeat_ad_keywords: "[escape_repeat_ad_keywords]"
        save_field: save_agency_result
      - key: service2field
        service:
          service: hrm.travel_agency_prompt_rel_delete_by_agency
          agency_id: "[agency_id]"
        save_field: prompt_rel_delete_result
        if_template: "{{ne .escape_user_keyword_list nil}}"
      - key: service2field
        service:
          service: hrm.travel_agency_prompt_rel_save_by_agency
          agency_id: "[agency_id]"
          prompt_type: system
          keyword_list: "[escape_system_keyword_dedup_list]"
        save_field: system_keyword_save_result
      - key: service2field
        service:
          service: hrm.travel_agency_prompt_rel_save_by_agency
          agency_id: "[agency_id]"
          prompt_type: user
          keyword_list: "[escape_user_keyword_dedup_list]"
        save_field: user_keyword_save_result
        if_template: "{{ne .escape_user_keyword_list nil}}"
    result_handler:
      - key: params2result
        fields:
          - from: "[agency_id]"
            to: agency_id
          - from: "[save_agency_result]"
            to: save_agency_result
          - from: "[system_keyword_save_result]"
            to: system_keyword_save_result
          - from: "[user_keyword_save_result]"
            to: user_keyword_save_result

