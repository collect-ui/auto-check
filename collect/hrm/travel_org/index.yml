service:
  - key: travel_agency_list
    http: true
    module: sql
    params:
      search:
        template: "{{ if .search }}%{{.search}}%{{ end }}"
      page:
        type: int
        default: 1
      size:
        default: 20
        type: int
      start:
        template: " ({{.page}}-1) * {{.size}}"
        exec: true
        type: int
      pagination:
        default: true
      count:
        default: true
    data_file: travel_agency_list.sql
    count_file: travel_agency_count.sql
    pagination: pagination
    count: "[count]"

  - key: travel_agency_save
    http: true
    module: model_save
    table: travel_agency
    params:
      agency_id:
        template: "{{uuid}}"
      agency_name:
        check:
          template: "{{must .agency_name}}"
          err_msg: 商家名称不能为空
      agency_code:
        check:
          template: "{{must .agency_code}}"
          err_msg: 商家编码不能为空
      biz_type:
        default: travel
      checkin_status:
        default: pending
      status:
        default: normal
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"

  - key: travel_agency_update
    http: true
    module: model_update
    table: travel_agency
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 商家ID不能为空
      agency_name:
        check:
          template: "{{must .agency_name}}"
          err_msg: 商家名称不能为空
      agency_code:
        check:
          template: "{{must .agency_code}}"
          err_msg: 商家编码不能为空
    filter:
      agency_id: "[agency_id]"

  - key: travel_agency_delete
    http: true
    module: model_delete
    table: travel_agency
    params:
      agency_id_list:
        check:
          template: "{{must .agency_id_list}}"
          err_msg: 请选择要删除的商家
    filter:
      agency_id__in: "[agency_id_list]"

  - key: travel_org_user_list
    http: true
    module: sql
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: agency_id不能为空
      search:
        template: "{{ if .search }}%{{.search}}%{{ end }}"
      role_type:
        default: ""
      page:
        type: int
        default: 1
      size:
        default: 20
        type: int
      start:
        template: " ({{.page}}-1) * {{.size}}"
        exec: true
        type: int
      pagination:
        default: true
      count:
        default: true
    data_file: travel_org_user_list.sql
    count_file: travel_org_user_count.sql
    pagination: pagination
    count: "[count]"

  - key: travel_org_user_save
    http: true
    module: empty
    params:
      user_id:
        template: "{{uuid}}"
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社不能为空
      username:
        check:
          template: "{{must .username}}"
          err_msg: 用户名不能为空
      nick:
        check:
          template: "{{must .nick}}"
          err_msg: 姓名不能为空
      password:
        check:
          template: "{{must .password}}"
          err_msg: 密码不能为空
      phone:
        default: ""
      role_type:
        check:
          template: "{{or (eq .role_type `supervisor`) (eq .role_type `sales`)}}"
          err_msg: 角色仅支持supervisor或sales
      supervisor_user_id:
        default: ""
      status:
        default: normal
      relation_id:
        template: "{{uuid}}"
      create_time:
        template: "{{current_date_time}}"
    handler_params:
      - key: update_field
        fields:
          - field: supervisor_user_id
            template: "{{if .supervisor_user_id}}{{.supervisor_user_id}}{{else}}{{end}}"
      - key: check_field
        enable: "{{eq .role_type `sales`}}"
        fields:
          - field: supervisor_user_id
            template: "{{must .supervisor_user_id}}"
            err_msg: 销售必须选择主管
      - key: field2array
        field: "[role_type]"
        save_field: role_id_list
      - key: service2field
        service:
          service: hrm.create_user_flow
          user_id: "[user_id]"
          username: "[username]"
          nick: "[nick]"
          password: "[password]"
          phone: "[phone]"
          status: "[status]"
          role_id_list: "[role_id_list]"
        save_field: created_user_id
      - key: service2field
        service:
          service: hrm.travel_org_user_rel_save
          relation_id: "[relation_id]"
          agency_id: "[agency_id]"
          user_id: "[created_user_id]"
          role_type: "[role_type]"
          supervisor_user_id: "[supervisor_user_id]"
          status: "[status]"
          create_time: "[create_time]"
          create_user: "[session_user_id]"

  - key: travel_org_user_rel_save
    http: true
    module: model_save
    table: travel_agency_user_rel
    params:
      relation_id:
        template: "{{uuid}}"
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 商家不能为空
      user_id:
        check:
          template: "{{must .user_id}}"
          err_msg: 用户不能为空
      role_type:
        check:
          template: "{{or (eq .role_type `supervisor`) (eq .role_type `sales`)}}"
          err_msg: 角色仅支持supervisor或sales
      supervisor_user_id:
        default: ""
      status:
        default: normal
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"
  - key: travel_org_user_update
    http: true
    module: model_update
    table: travel_agency_user_rel
    params:
      relation_id:
        check:
          template: "{{must .relation_id}}"
          err_msg: 关系ID不能为空
      role_type:
        check:
          template: "{{or (eq .role_type `supervisor`) (eq .role_type `sales`)}}"
          err_msg: 角色仅支持supervisor或sales
      supervisor_user_id:
        default: ""
    handler_params:
      - key: check_field
        enable: "{{eq .role_type `sales`}}"
        fields:
          - field: supervisor_user_id
            template: "{{must .supervisor_user_id}}"
            err_msg: 销售必须选择主管
    filter:
      relation_id: "[relation_id]"

  - key: travel_org_user_delete
    http: true
    module: model_delete
    table: travel_agency_user_rel
    params:
      relation_id_list:
        check:
          template: "{{must .relation_id_list}}"
          err_msg: 请选择要删除的数据
    filter:
      relation_id__in: "[relation_id_list]"
