service:
  - key: travel_agency_list
    http: true
    module: sql
    params:
      agency_id:
        default: ""
      checkin_status:
        default: ""
      wx_sync_enabled:
        default: ""
      search:
        template: "{{ if .search }}%{{.search}}%{{ end }}"
      page:
        type: int
        default: 1
      size:
        default: 20
        type: int
      start:
        template: " ({{.page}}-1) * {{.size}}"
        exec: true
        type: int
      pagination:
        default: true
      count:
        default: true
      to_obj:
        default: false
    data_file: travel_agency_list.sql
    count_file: travel_agency_count.sql
    pagination: pagination
    count: "[count]"
    result_handler:
      - key: arr2obj
        enable: "[to_obj]"

  - key: travel_agency_save
    http: true
    module: model_save
    table: travel_agency
    params:
      agency_id:
        template: "{{uuid}}"
      agency_name:
        check:
          template: "{{must .agency_name}}"
          err_msg: 商家名称不能为空
      agency_code:
        check:
          template: "{{must .agency_code}}"
          err_msg: 商家编码不能为空
      biz_type:
        default: travel
      status:
        default: normal
      checkin_status:
        default: not_checked_in
      wx_sync_enabled:
        default: no
      wx_sync_error_count:
        default: 0
        type: int
      wx_sync_expire_time:
        default: 0
        type: int
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"

  - key: travel_agency_wx_update_simple
    http: true
    module: model_update
    table: travel_agency
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 商家ID不能为空
    filter:
      agency_id: "[agency_id]"
    update_fields:
      - wx_sync_access_token
      - wx_sync_company_id
      - wx_sync_user_id
      - wx_sync_access_token
      - wx_sync_department_id
      - wx_sync_role_id
      - wx_sync_role_id
      - wx_sync_expire_time
  - key: travel_agency_update
    http: true
    module: model_update
    table: travel_agency
    log: true
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 商家ID不能为空
      agency_name:
        check:
          template: "{{must .agency_name}}"
          err_msg: 商家名称不能为空
      agency_code:
        check:
          template: "{{must .agency_code}}"
          err_msg: 商家编码不能为空
      wx_sync_error_count:
        type: int
      wx_sync_expire_time:
        type: int
    filter:
      agency_id: "[agency_id]"

  - key: travel_agency_delete
    http: true
    module: model_delete
    table: travel_agency
    params:
      agency_id_list:
        check:
          template: "{{must .agency_id_list}}"
          err_msg: 请选择要删除的商家
    filter:
      agency_id__in: "[agency_id_list]"

  - key: travel_employee_list
    http: true
    module: sql
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: agency_id不能为空
      search:
        template: "{{ if .search }}%{{.search}}%{{ end }}"
      page:
        type: int
        default: 1
      size:
        default: 20
        type: int
      start:
        template: " ({{.page}}-1) * {{.size}}"
        exec: true
        type: int
      pagination:
        default: true
      count:
        default: true
      to_obj: 
        default: false
    data_file: travel_employee_list.sql
    count_file: travel_employee_count.sql
    pagination: pagination
    count: "[count]"
    result_handler:
      - key: arr2obj
        enable: "[to_obj]"

  - key: travel_employee_save
    http: true
    module: model_save
    table: travel_employee
    params:
      employee_id:
        template: "{{uuid}}"
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社不能为空
      nick_name:
        check:
          template: "{{must .nick_name}}"
          err_msg: 姓名不能为空
      alias:
        default: ""
      head:
        default: ""
      ower_wx_alias:
        default: ""
      phone:
        default: ""
      phone_user:
        type: int
        default: 0
      user_id:
        type: int
        default: 0
      wx_id:
        default: ""
      wx_target:
        type: int
        default: 1
      status:
        default: normal
      escape_last_analyze_time:
        default: ""
      escape_is_escape:
        type: int
        default: 0
      escape_ai_content:
        default: ""
      description:
        default: ""
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"

  - key: travel_employee_update
    http: true
    module: model_update
    table: travel_employee
    params:
      employee_id:
        check:
          template: "{{must .employee_id}}"
          err_msg: 员工ID不能为空
      nick_name:
        check:
          template: "{{must .nick_name}}"
          err_msg: 姓名不能为空
      alias:
        default: ""
      head:
        default: ""
      ower_wx_alias:
        default: ""
      phone:
        default: ""
      phone_user:
        type: int
        default: 0
      user_id:
        type: int
        default: 0
      wx_id:
        default: ""
      wx_target:
        type: int
        default: 1
      status:
        default: normal
      escape_last_analyze_time:
        default: ""
      escape_is_escape:
        type: int
        default: 0
      escape_ai_content:
        default: ""
      description:
        default: ""
      modify_time:
        template: "{{current_date_time}}"
      modify_user:
        template: "{{.session_user_id}}"
    filter:
      employee_id: "[employee_id]"

  - key: travel_employee_delete
    http: true
    module: model_update
    table: travel_employee
    params:
      employee_id_list:
        check:
          template: "{{must .employee_id_list}}"
          err_msg: 请选择要删除的员工
      modify_time:
        template: "{{current_date_time}}"
      modify_user:
        template: "{{.session_user_id}}"
    filter:
      employee_id__in: "[employee_id_list]"
    update_fields:
      - status
      - modify_time
      - modify_user
    update_values:
       status: "deleted"

  - key: travel_employee_bulk_create
    http: true
    module: bulk_create
    table: travel_employee
    model_field: employee_list
    params:
      employee_list:
        check:
          template: "{{must .employee_list}}"
          err_msg: 员工列表不能为空

  - key: travel_employee_bulk_update
    http: true
    module: bulk_update
    table: travel_employee
    params:
      employee_list:
        check:
          template: "{{must .employee_list}}"
          err_msg: 员工列表不能为空

  - key: travel_employee_bulk_delete
    log: true
    http: true
    module: model_delete
    table: travel_employee
    params:
      employee_id_list:
        check:
          template: "{{must .employee_id_list}}"
          err_msg: 请选择要删除的员工
    filter:
      employee_id__in: "[employee_id_list]"

  - key: travel_employee_delete_by_agency
    http: true
    module: model_delete
    table: travel_employee
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
    filter:
      agency_id: "[agency_id]"
