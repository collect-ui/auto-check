    update_fields:
      - keyword
      - sort_no

  - key: travel_agency_prompt_rel_delete
    http: true
    module: model_delete
    table: travel_agency_escape_prompt_rel
    params:
      rel_id:
        check:
          template: "{{must .rel_id}}"
          err_msg: rel_id不能为空
    filter:
      rel_id: "[rel_id]"

  - key: travel_agency_prompt_rel_delete_batch
    http: true
    module: model_delete
    table: travel_agency_escape_prompt_rel
    params:
      rel_id_list:
        check:
          template: "{{must .rel_id_list}}"
          err_msg: 请选择要删除的提示词
    filter:
      rel_id__in: "[rel_id_list]"

  - key: travel_agency_prompt_rel_bulk_create
    http: true
    module: bulk_create
    table: travel_agency_escape_prompt_rel
    params:
      rel_list:
        check:
          template: "{{must .rel_list}}"
          err_msg: 关键词关联数据不能为空
    model_field: "[rel_list]"

  - key: travel_agency_prompt_rel_save_by_agency
    http: true
    module: empty
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
      prompt_type:
        check:
          template: "{{must .prompt_type}}"
          err_msg: prompt_type不能为空
      keyword_list:
        default: []
    handler_params:
      - key: filter_arr
        foreach: "[keyword_list]"
        item: item
        if_template: "{{must .item.keyword}}"
        save_field: keyword_not_empty_list
      - key: group_by
        foreach: "[keyword_not_empty_list]"
        children: children
        fields:
          - field: "[keyword]"
        save_field: keyword_dedup_list
      - key: update_array
        foreach: "[keyword_dedup_list]"
        item: item
        fields:
          - field: keyword
            template: "[item.keyword]"
          - field: agency_id
            template: "[agency_id]"
          - field: prompt_type
            template: "[prompt_type]"
          - field: sort_no
            template: "[loop_index]"
            type: int
          - field: rel_id
            template: "{{uuid}}"
          - field: status
            template: "normal"
          - field: create_time
            template: "{{current_date_time}}"
          - field: create_user
            template: "{{.session_user_id}}"
      - key: prop_arr
        foreach: "[keyword_dedup_list]"
        value: "[keyword]"
        save_field: keyword_text_list
      - key: arr2arrayObj
        enable: "{{must .keyword_text_list}}"
        foreach: "[keyword_text_list]"
        item: item
        fields:
          - field: keyword
            template: "{{.item}}"
          - field: status
            template: "normal"
          - field: create_time
            template: "{{current_date_time}}"
          - field: create_user
            template: "{{.session_user_id}}"
        save_field: keyword_save_list
      - key: service2field
        enable: "{{must .keyword_save_list}}"
        service:
          service: hrm.travel_escape_prompt_keyword_bulk_upsert
          keyword_list: "[keyword_save_list]"
        save_field: keyword_upsert_result
      - key: service2field
        enable: "{{must .keyword_dedup_list}}"
        service:
          service: hrm.travel_agency_prompt_rel_bulk_create
          rel_list: "[keyword_dedup_list]"
        save_field: rel_create_result
    result_handler:
      - key: params2result
        fields:
          - from: "[prompt_type]"
            to: prompt_type
          - from: "[keyword_dedup_list]"
            to: keyword_list
          - from: "[rel_create_result]"
            to: rel_create_result

  - key: travel_agency_save_raw
    http: true
    log: true
    module: model_save
    table: travel_agency
    params:
      agency_id:
        template: "{{ if .agency_id}}{{.agency_id}}{{else}}{{uuid}}{{end}}"
      agency_name:
        check:
          template: "{{must .agency_name}}"
          err_msg: 商家名称不能为空
      agency_code:
        check:
          template: "{{must .agency_code}}"
          err_msg: 商家编码不能为空
      biz_type:
        default: travel
      status:
        default: normal
      checkin_status:
        default: not_checked_in
      wx_sync_enabled:
        default: "no"
      wx_sync_error_count:
        default: 0
        type: int
      wx_sync_expire_time:
        default: 0
        type: int
      deepseek_api_key:
        default: ""
      escape_system_prompt:
        default: ""
      escape_user_prompt:
        default: ""
      escape_repeat_ad_keywords:
        default: ""
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"

  - key: travel_agency_save
    http: true
    module: empty
    params:
      agency_id:
        template: "{{uuid}}"
