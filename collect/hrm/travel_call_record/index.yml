service:
  - key: travel_call_record_bulk_create
    http: true
    module: bulk_create
    table: travel_call_record
    model_field: record_list
    params:
      record_list:
        check:
          template: "{{must .record_list}}"
          err_msg: 电话记录列表不能为空

  - key: travel_call_record_bulk_update
    http: true
    module: bulk_upsert
    table: travel_call_record
    model_field: record_list
    update_fields:
      - uid
      - agency_id
      - employee_id
      - phone_id
      - name
      - phone_out_number
      - phone_in_number
      - relegation
      - phone_operator
      - phone_call_type
      - phone_client_type
      - ring_time_length
      - phone_ring_time
      - phone_end_time
      - phone_status
      - call_time_length
      - phone_record_address
      - phone_start_time
      - group_id
      - user_id
      - phone_type
      - parsed_text
      - phone_record_text
      - create_time
      - modify_time
    params:
      record_list:
        check:
          template: "{{must .record_list}}"
          err_msg: 电话记录列表不能为空

  - key: travel_call_record_list
    http: true
    module: sql
    params:
      no_record_text:
        default: false
      limit:
        default: 500
      to_obj:
        default: false
    data_file: travel_call_record_list.sql
    result_handler:
      - key: arr2obj
        enable: "[to_obj]"

  - key: travel_call_record_history_delete_query
    http: true
    module: sql
    params:
      agency_id:
        default: ""
      cutoff_time:
        default: 0
        template: "{{if .cutoff_time}}{{.cutoff_time}}{{else}}{{unix_time -60 `day`}}*1000{{end}}"
        exec: true
        type: int64
    data_file: travel_call_record_history_delete_query.sql

  - key: travel_call_record_delete_by_uid_list
    http: true
    module: model_delete
    table: travel_call_record
    params:
      query_list:
        default: []
      uid_list:
        default: []
        check:
          template: "{{or (must .query_list) (must .uid_list)}}"
          err_msg: 电话记录ID列表不能为空
    handler_params:
      - key: prop_arr
        enable: "{{must .query_list}}"
        foreach: "[query_list]"
        value: "[uid]"
        save_field: uid_list
    filter:
      uid__in: "[uid_list]"

  - key: travel_call_record_bulk_update_record_text
    http: true
    module: bulk_upsert
    table: travel_call_record
    model_field: update_list
    update_fields:
      - uid
      - phone_record_text
      - modify_time
    params:
      update_list:
        check:
          template: "{{must .update_list}}"
          err_msg: 更新列表不能为空

  - key: travel_call_record_update_record_text_one
    http: true
    module: model_update
    table: travel_call_record
    params:
      uid:
        check:
          template: "{{must .uid}}"
          err_msg: uid不能为空
      phone_record_text:
        default: ""
      analyze_time:
        template: "{{current_date_time}}"
      modify_time:
        template: "{{current_date_time}}"
    filter:
      uid: "[uid]"
    update_fields:
      - phone_record_text
      - analyze_time
      - modify_time

  - key: transcribe_call_record_one
    http: true
    module: empty
    params:
      uid:
        default: ""
      phone_record_address:
        default: ""
      phone_record_text:
        default: ""
      allow:
        default: []
      transcribe_result:
        default: {}
      transcribe_text:
        default: ""
      transcribe_status:
        default: ""
      transcribe_error:
        default: ""
      tencent_account_name:
        default: ""
    handler_params:
      - key: update_field
        enable: "{{and (must .phone_record_address) (not (must .phone_record_text))}}"
        fields:
          - field: file_url
            template: "[phone_record_address]"
      - key: service2field
        enable: "{{and (must .file_url) (not (must .phone_record_text))}}"
        service:
          service: hrm.transcribe
          file_url: "[file_url]"
          allow: "[allow]"
        save_field: transcribe_result
      - key: update_field
        enable: "{{must .transcribe_result}}"
        fields:
          - field: transcribe_text
            template: "[transcribe_result.text]"
          - field: transcribe_status
            template: "[transcribe_result.status]"
          - field: transcribe_error
            template: "[transcribe_result.error]"
          - field: tencent_account_name
            template: "[transcribe_result.tencent_account_name]"
      - key: update_field
        enable: "{{must .transcribe_text}}"
        fields:
          - field: phone_record_text
            template: "[transcribe_text]"
          - field: modify_time
            template: "{{current_date_time}}"
      - key: service2field
        enable: "{{must .transcribe_text}}"
        service:
          service: hrm.travel_call_record_update_record_text_one
          uid: "[uid]"
          phone_record_text: "[phone_record_text]"
          analyze_time: "[analyze_time]"
          modify_time: "[modify_time]"
        save_field: update_result
    result_handler:
      - key: params2result
        fields:
          - from: "[uid]"
            to: uid
          - from: "[transcribe_status]"
            to: transcribe_status
          - from: "[transcribe_error]"
            to: transcribe_error
          - from: "[tencent_account_name]"
            to: tencent_account_name
          - from: "[transcribe_text]"
            to: transcribe_text
          - from: "[update_result]"
            to: update_result

  - key: transcribe_call_record_bulk
    http: true
    module: bulk_service
    params:
      data_list:
        default: []
      allow:
        default: []
    batch:
      foreach: "[data_list]"
      item: item
      loop_max: 30
      service:
        service: hrm.transcribe_call_record_one
        allow: "[params.allow]"
      save_field: transcribe_result
      append_item_param: true

  - key: gen_call_record_text
    http: true
    module: empty
    params:
      agency_id:
        default: ""
      employee_id:
        default: ""
      start_time:
        default: 0
        type: int64
      end_time:
        default: 0
        type: int64
      limit:
        default: 200
      data_list:
        default: []
      transcribe_results:
        default: []
      allow:
        default: []
    handler_params:
      - key: service2field
        service:
          service: hrm.travel_call_record_list
          agency_id: "[agency_id]"
          employee_id: "[employee_id]"
          no_record_text: true
          start_time: "[start_time]"
          end_time: "[end_time]"
          limit: "[limit]"
        save_field: data_list

      - key: update_array
        enable: "{{gt (len .data_list) 0}}"
        foreach: "[data_list]"
        item: item
        fields:
          - field: file_url
            template: "[item.phone_record_address]"

      - key: service2field
        enable: "{{gt (len .data_list) 0}}"
        service:
          service: hrm.tencent_key_agency_key_list
          agency_id: "[agency_id]"
          status: normal
          pagination: false
          count: false
        save_field: key_list

      - key: prop_arr
        enable: "{{gt (len .data_list) 0}}"
        foreach: "[key_list]"
        value: "[account_name]"
        save_field: allow

      - key: check_field
        enable: "{{gt (len .data_list) 0}}"
        fields:
          - field: allow
            template: "{{gt (len .allow) 0}}"
            err_msg: 当前旅行社未配置语音转写白名单账号，禁止调用语音转写

      - key: service2field
        enable: "{{gt (len .data_list) 0}}"
        name: 串行逐条转写并保存
        service:
          service: hrm.transcribe_call_record_bulk
          data_list: "[data_list]"
          allow: "[allow]"
        save_field: transcribe_results

    result_handler:
      - key: params2result
        fields:
          - from: "[data_list]"
            to: data_list
          - from: "[transcribe_results]"
            to: transcribe_results

  - key: gen_voice_text
    http: true
    module: empty
    params:
      agency_id:
        default: ""
      employee_id:
        default: ""
      start_time:
        default: 0
        type: int64
      end_time:
        default: 0
        type: int64
      chat_limit:
        default: 500
      call_limit:
        default: 500
      list_limit:
        default: 10000
    handler_params:
      - key: service2field
        name: 微信语音转写
        service:
          service: hrm.gen_file_text
          agency_id: "[agency_id]"
          employee_id: "[employee_id]"
          message_time_from: "[start_time]"
          message_time_to: "[end_time]"
          limit: "[chat_limit]"
        save_field: gen_file_text_result

      - key: service2field
        name: 电话录音转写
        service:
          service: hrm.gen_call_record_text
          agency_id: "[agency_id]"
          employee_id: "[employee_id]"
          start_time: "[start_time]"
          end_time: "[end_time]"
          limit: "[call_limit]"
        save_field: gen_call_record_text_result

      - key: service2field
        name: 刷新电话记录列表
        service:
          service: hrm.travel_call_record_list
          agency_id: "[agency_id]"
          employee_id: "[employee_id]"
          start_time: "[start_time]"
          end_time: "[end_time]"
          limit: "[list_limit]"
        save_field: call_record_list

    result_handler:
      - key: params2result
        fields:
          - from: "[gen_file_text_result]"
            to: gen_file_text_result
          - from: "[gen_call_record_text_result]"
            to: gen_call_record_text_result
          - from: "[call_record_list]"
            to: call_record_list

  - key: travel_call_record_delete_by_agency
    http: true
    module: model_delete
    table: travel_call_record
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
    filter:
      agency_id: "[agency_id]"
