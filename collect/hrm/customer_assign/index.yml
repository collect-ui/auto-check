service:
  - key: customer_lead_list
    http: true
    module: sql
    params:
      assign_date_range:
        default: []
      assign_date_filter_enabled:
        template: "{{if and .assign_date_range (ge (len .assign_date_range) 2) (index .assign_date_range 0) (index .assign_date_range 1)}}1{{end}}"
      assign_date_start:
        template: "{{if eq .assign_date_filter_enabled \"1\"}}{{index .assign_date_range 0}}{{else}}1900-01-01{{end}}"
      assign_date_end:
        template: "{{if eq .assign_date_filter_enabled \"1\"}}{{index .assign_date_range 1}}{{else}}2999-12-31{{end}}"
      agency_id:
        default: ""
      search:
        template: "{{ if .search }}%{{.search}}%{{ end }}"
      page:
        type: int
        default: 1
      size:
        default: 20
        type: int
      start:
        template: " ({{.page}}-1) * {{.size}}"
        exec: true
        type: int
      pagination:
        default: true
      count:
        default: true
    data_file: lead_list.sql
    count_file: lead_count.sql
    pagination: pagination
    count: "[count]"

  - key: customer_lead_save
    http: true
    module: model_save
    table: customer_lead_pool
    params:
      lead_id:
        template: "{{if .lead_id}}{{.lead_id}}{{else}}{{uuid}}{{end}}"
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社不能为空
      customer_name:
        check:
          template: "{{must .customer_name}}"
          err_msg: 线路名称不能为空
      contact:
        default: ""
      wechat_account:
        default: ""
      source_platform:
        default: douyin
      status:
        default: normal
      description:
        default: ""
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"

  - key: customer_lead_save_with_assign
    http: true
    module: empty
    params:
      lead_id:
        template: "{{uuid}}"
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社不能为空
      customer_name:
        check:
          template: "{{must .customer_name}}"
          err_msg: 线路名称不能为空
      contact:
        default: ""
      wechat_account:
        default: ""
      source_platform:
        default: douyin
      status:
        default: normal
      description:
        default: ""
      assign_date:
        default: "{{current_date}}"
      sales_user_id:
        default: ""
      route_id:
        default: ""
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"
    handler_params:
      - key: service2field
        service:
          service: hrm.customer_lead_save
          lead_id: "[lead_id]"
          agency_id: "[agency_id]"
          customer_name: "[customer_name]"
          contact: "[contact]"
          wechat_account: "[wechat_account]"
          source_platform: "[source_platform]"
          status: "[status]"
          description: "[description]"
          create_time: "[create_time]"
          create_user: "[create_user]"
      - key: service2field
        service:
          service: hrm.customer_lead_assign_save
          lead_id: "[lead_id]"
          agency_id: "[agency_id]"
          assign_date: "[assign_date]"
          sales_user_id: "[sales_user_id]"
          route_id: "[route_id]"

  - key: customer_lead_update
    http: true
    module: model_update
    table: customer_lead_pool
    params:
      lead_id:
        check:
          template: "{{must .lead_id}}"
          err_msg: 线路ID不能为空
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社不能为空
      customer_name:
        check:
          template: "{{must .customer_name}}"
          err_msg: 线路名称不能为空
      contact:
        default: ""
      wechat_account:
        default: ""
      source_platform:
        default: douyin
      status:
        default: normal
      description:
        default: ""
    filter:
      lead_id: "[lead_id]"

  - key: customer_lead_delete
    http: true
    module: model_delete
    table: customer_lead_pool
    params:
      lead_id_list:
        check:
          template: "{{must .lead_id_list}}"
          err_msg: 请选择要删除的线路
    filter:
      lead_id__in: "[lead_id_list]"

  - key: customer_lead_assign_save
    http: true
    module: model_save
    table: customer_lead_assign
    params:
      assign_id:
        template: "{{uuid}}"
      lead_id:
        check:
          template: "{{must .lead_id}}"
          err_msg: lead_id不能为空
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: agency_id不能为空
      assign_date:
        check:
          template: "{{must .assign_date}}"
          err_msg: assign_date不能为空
      sales_user_id:
        check:
          template: "{{must .sales_user_id}}"
          err_msg: 请选择销售
      route_id:
        check:
          template: "{{must .route_id}}"
          err_msg: 请选择线路
      supervisor_user_id:
        default: ""
      status:
        default: normal
      description:
        default: ""
      create_time:
        template: "{{current_date_time}}"
      create_user:
        template: "{{.session_user_id}}"
      update_time:
        template: "{{current_date_time}}"
      update_user:
        template: "{{.session_user_id}}"

  - key: customer_lead_assign_update
    http: true
    module: model_update
    table: customer_lead_assign
    params:
      assign_id:
        check:
          template: "{{must .assign_id}}"
          err_msg: assign_id不能为空
      sales_user_id:
        check:
          template: "{{must .sales_user_id}}"
          err_msg: 请选择销售
      route_id:
        check:
          template: "{{must .route_id}}"
          err_msg: 请选择线路
      supervisor_user_id:
        default: ""
      description:
        default: ""
      update_time:
        template: "{{current_date_time}}"
      update_user:
        template: "{{.session_user_id}}"
    filter:
      assign_id: "[assign_id]"

  - key: customer_lead_assign_cancel
    http: true
    module: model_update
    table: customer_lead_assign
    params:
      assign_id:
        check:
          template: "{{must .assign_id}}"
          err_msg: assign_id不能为空
      status:
        default: canceled
      update_time:
        template: "{{current_date_time}}"
      update_user:
        template: "{{.session_user_id}}"
    filter:
      assign_id: "[assign_id]"

  - key: customer_sales_options
    http: true
    module: sql
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: agency_id不能为空
    data_file: sales_options.sql

  - key: customer_sales_route_options
    http: true
    module: sql
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: agency_id不能为空
      sales_user_id:
        check:
          template: "{{must .sales_user_id}}"
          err_msg: sales_user_id不能为空
    data_file: sales_route_options.sql
