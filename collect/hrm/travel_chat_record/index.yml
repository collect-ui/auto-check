service:
  - key: travel_chat_record_bulk_create
    http: true
    module: bulk_create
    table: travel_chat_record
    model_field: record_list
    params:
      record_list:
        check:
          template: "{{must .record_list}}"
          err_msg: 聊天记录列表不能为空

  - key: travel_chat_record_list
    http: true
    module: sql
    params:
      no_file_text:
        default: false
      limit:
        default: 500
    data_file: travel_chat_record_list.sql

  - key: transcribe
    module: http
    log: true
    http: true
    params:
      file_url:
        check:
          template: "{{must .file_url}}"
          err_msg: file_url不能为空
    handler_params:
      - key: update_field
        name: 更新字段
        fields:
          - field: file_url
            template: "https://df.qi.work/{{.file_url}}"
    http_json: transcribe.json
    result_handler:
      - key: result2params
        fields:
          - from: "[data]"
            to: "[data]"
      - key: param2result
        field: "[data]"

  - key: transcribe_bulk
    module: bulk_service
    params:
      data_list:
        default: []
    batch:
      foreach: "[data_list]"
      item: item
      loop_max: 2
      service:
        service: hrm.transcribe
      save_field: transcribe_result
      append_item_param: true

  - key: travel_chat_record_bulk_update_file_text
    module: bulk_upsert
    table: travel_chat_record
    model_field: update_list
    params:
      update_list:
        check:
          template: "{{must .update_list}}"
          err_msg: 更新列表不能为空

  - key: gen_file_text
    http: true
    module: empty
    handler_params:
      - key: service2field 
        service:
          service: hrm.travel_chat_record_list
          no_file_text: true
        save_field: data_list
      - key: service2field
        enable: "{{gt (len .data_list) 0}}"
        name: 批量调用transcribe
        service:
          service: hrm.transcribe_bulk
          data_list: "[data_list]"
        save_field: transcribe_results
      - key: update_array
        foreach: "[transcribe_results]"
        item: item
        fields:
          - field: file_text
            template: "[item.transcribe_result.data]"
            
          - field: content
            template: "[item.transcribe_result.data]"
      - key: service2field
        enable: "{{gt (len .transcribe_results) 0}}"
        name: 批量更新file_text
        service:
          service: hrm.travel_chat_record_bulk_update_file_text
          update_list: "[transcribe_results]"
    result_handler:
      - key: params2result
        fields:
          - from: "[transcribe_results]"
            to: transcribe_results

  - key: travel_chat_record_delete_by_agency
    http: true
    module: model_delete
    table: travel_chat_record
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
    filter:
      agency_id: "[agency_id]"
