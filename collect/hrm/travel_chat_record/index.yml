service:
  - key: travel_chat_record_bulk_create
    http: true
    module: bulk_upsert
    table: travel_chat_record
    model_field: record_list
    params:
      record_list:
        check:
          template: "{{must .record_list}}"
          err_msg: 聊天记录列表不能为空

  - key: travel_chat_record_bulk_update_relation
    http: true
    module: bulk_upsert
    table: travel_chat_record
    model_field: record_list
    update_fields:
      - agency_id
      - employee_id
      - contact_id
      - owner_head
      - modify_time
    params:
      record_list:
        check:
          template: "{{must .record_list}}"
          err_msg: 聊天记录列表不能为空

  - key: travel_chat_record_bulk_update_attachment
    http: true
    module: bulk_upsert
    table: travel_chat_record
    model_field: record_list
    update_fields:
      - agency_id
      - employee_id
      - contact_id
      - content
      - file_name
      - file_size
      - file_status
      - file_url
      - link_url
      - analyze_time
      - modify_time
    params:
      record_list:
        check:
          template: "{{must .record_list}}"
          err_msg: 聊天记录列表不能为空

  - key: travel_chat_record_list
    http: true
    module: sql
    params:
      no_file_text:
        default: false
      limit:
        default: 500
    data_file: travel_chat_record_list.sql

  - key: travel_chat_record_history_delete_query
    http: true
    module: sql
    params:
      agency_id:
        default: ""
      cutoff_time:
        default: 0
        template: "{{if .cutoff_time}}{{.cutoff_time}}{{else}}{{unix_time -60 `day`}}*1000{{end}}"
        exec: true
        type: int64
    data_file: travel_chat_record_history_delete_query.sql

  - key: travel_chat_record_delete_by_uid_list
    http: true
    module: model_delete
    table: travel_chat_record
    params:
      query_list:
        default: []
      uid_list:
        default: []
        check:
          template: "{{or (must .query_list) (must .uid_list)}}"
          err_msg: 聊天记录ID列表不能为空
    handler_params:
      - key: prop_arr
        enable: "{{must .query_list}}"
        foreach: "[query_list]"
        value: "[uid]"
        save_field: uid_list
    filter:
      uid__in: "[uid_list]"

  - key: transcribe
    module: http
    log: true
    http: true
    params:
      file_url:
        check:
          template: "{{must .file_url}}"
          err_msg: file_url不能为空
      allow:
        default: []
    handler_params:
      - key: check_field
        fields:
          - field: allow
            template: "{{gt (len .allow) 0}}"
            err_msg: 未配置语音转写白名单，禁止调用语音转写
      - key: update_field
        name: 更新字段
        fields:
          - field: file_url
            template: "{{if or (str_contains .file_url `http://`) (str_contains .file_url `https://`)}}{{.file_url}}{{else}}{{get_key `qi_work_file_base_url`}}/{{.file_url}}{{end}}"
    http_json: transcribe.json
    result_handler:
      - key: result2params
        fields:
          - from: "[status]"
            to: "[status]"
          - from: "[text]"
            to: "[text]"
          - from: "[error]"
            to: "[error]"
          - from: "[tencent_account_name]"
            to: "[tencent_account_name]"
          - from: "[tencent_secret_id_masked]"
            to: "[tencent_secret_id_masked]"
          - from: "[cache_hit]"
            to: "[cache_hit]"
      - key: params2result
        fields:
          - from: "[status]"
            to: status
          - from: "[text]"
            to: text
          - from: "[error]"
            to: error
          - from: "[tencent_account_name]"
            to: tencent_account_name
          - from: "[tencent_secret_id_masked]"
            to: tencent_secret_id_masked
          - from: "[cache_hit]"
            to: cache_hit

  - key: transcribe_bulk
    module: bulk_service
    params:
      data_list:
        default: []
      allow:
        default: []
    batch:
      foreach: "[data_list]"
      item: item
      loop_max: 30
      service:
        service: hrm.transcribe
        allow: "[params.allow]"
      save_field: transcribe_result
      append_item_param: true

  - key: travel_chat_record_bulk_update_file_text
    module: bulk_upsert
    table: travel_chat_record
    model_field: update_list
    params:
      update_list:
        check:
          template: "{{must .update_list}}"
          err_msg: 更新列表不能为空

  - key: travel_chat_record_update_file_text_one
    module: model_update
    table: travel_chat_record
    params:
      uid:
        check:
          template: "{{must .uid}}"
          err_msg: uid不能为空
      wx_id:
        check:
          template: "{{must .wx_id}}"
          err_msg: wx_id不能为空
      file_text:
        default: ""
      content:
        default: ""
      analyze_time:
        template: "{{current_date_time}}"
      modify_time:
        template: "{{current_date_time}}"
    filter:
      uid: "[uid]"
      wx_id: "[wx_id]"
    update_fields:
      - file_text
      - content
      - analyze_time
      - modify_time

  - key: transcribe_chat_record_one
    module: empty
    params:
      uid:
        default: ""
      wx_id:
        default: ""
      file_url:
        default: ""
      allow:
        default: []
      file_text:
        default: ""
      content:
        default: ""
      transcribe_result:
        default: {}
      transcribe_text:
        default: ""
      transcribe_status:
        default: ""
      transcribe_error:
        default: ""
      tencent_account_name:
        default: ""
    handler_params:
      - key: service2field
        enable: "{{and (must .file_url) (not (must .file_text))}}"
        service:
          service: hrm.transcribe
          file_url: "[file_url]"
          allow: "[allow]"
        save_field: transcribe_result
      - key: update_field
        enable: "{{must .transcribe_result}}"
        fields:
          - field: transcribe_text
            template: "[transcribe_result.text]"
          - field: transcribe_status
            template: "[transcribe_result.status]"
          - field: transcribe_error
            template: "[transcribe_result.error]"
          - field: tencent_account_name
            template: "[transcribe_result.tencent_account_name]"
      - key: update_field
        enable: "{{must .transcribe_text}}"
        fields:
          - field: file_text
            template: "[transcribe_text]"
          - field: content
            template: "[transcribe_text]"
          - field: modify_time
            template: "{{current_date_time}}"
      - key: service2field
        enable: "{{must .transcribe_text}}"
        service:
          service: hrm.travel_chat_record_update_file_text_one
          uid: "[uid]"
          wx_id: "[wx_id]"
          file_text: "[file_text]"
          content: "[content]"
          analyze_time: "[analyze_time]"
          modify_time: "[modify_time]"
        save_field: update_result
    result_handler:
      - key: params2result
        fields:
          - from: "[uid]"
            to: uid
          - from: "[wx_id]"
            to: wx_id
          - from: "[transcribe_status]"
            to: transcribe_status
          - from: "[transcribe_error]"
            to: transcribe_error
          - from: "[tencent_account_name]"
            to: tencent_account_name
          - from: "[transcribe_text]"
            to: transcribe_text
          - from: "[update_result]"
            to: update_result

  - key: transcribe_chat_record_bulk
    module: bulk_service
    params:
      data_list:
        default: []
      allow:
        default: []
    batch:
      foreach: "[data_list]"
      item: item
      loop_max: 30
      service:
        service: hrm.transcribe_chat_record_one
        allow: "[params.allow]"
      save_field: transcribe_result
      append_item_param: true

  - key: gen_file_text
    http: true
    module: empty
    params:
      agency_id:
        default: ""
      employee_id:
        default: ""
      contact_id:
        default: ""
      message_time_from:
        default: ""
      message_time_to:
        default: ""
      limit:
        default: 500
      allow:
        default: []
    handler_params:
      - key: service2field 
        service:
          service: hrm.travel_chat_record_list
          agency_id: "[agency_id]"
          employee_id: "[employee_id]"
          contact_id: "[contact_id]"
          message_time_from: "[message_time_from]"
          message_time_to: "[message_time_to]"
          no_file_text: true
          limit: "[limit]"
        save_field: data_list
      - key: service2field
        enable: "{{gt (len .data_list) 0}}"
        service:
          service: hrm.tencent_key_agency_key_list
          agency_id: "[agency_id]"
          status: normal
          pagination: false
          count: false
        save_field: key_list
      - key: prop_arr
        enable: "{{gt (len .data_list) 0}}"
        foreach: "[key_list]"
        value: "[account_name]"
        save_field: allow
      - key: check_field
        enable: "{{gt (len .data_list) 0}}"
        fields:
          - field: allow
            template: "{{gt (len .allow) 0}}"
            err_msg: 当前旅行社未配置语音转写白名单账号，禁止调用语音转写
      - key: service2field
        enable: "{{gt (len .data_list) 0}}"
        name: 串行逐条转写并保存
        service:
          service: hrm.transcribe_chat_record_bulk
          data_list: "[data_list]"
          allow: "[allow]"
        save_field: transcribe_results
    result_handler:
      - key: params2result
        fields:
          - from: "[transcribe_results]"
            to: transcribe_results

  - key: travel_chat_record_delete_by_agency
    http: true
    module: model_delete
    table: travel_chat_record
    params:
      agency_id:
        check:
          template: "{{must .agency_id}}"
          err_msg: 旅行社ID不能为空
    filter:
      agency_id: "[agency_id]"
